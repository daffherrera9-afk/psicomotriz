<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desarrollo Psicomotriz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Nunito',sans-serif;
    background:linear-gradient(135deg,#1a0533 0%,#0d1b4b 50%,#0a2a3a 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .star{position:absolute;background:white;border-radius:50%;animation:twinkle 2s infinite alternate}
  @keyframes twinkle{from{opacity:.2}to{opacity:1}}
  .container{position:relative;z-index:10;width:100%;max-width:780px;padding:16px}
  .card{background:rgba(255,255,255,.97);border-radius:32px;padding:32px 24px 36px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .header{text-align:center;margin-bottom:28px}
  .header .sub{font-size:.95rem;color:#666;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
  .header h1{font-size:clamp(2rem,8vw,3rem);font-weight:900;line-height:1.1}
  .line1{color:#7c3aed}.line2{color:#2563eb}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .btn{border:none;border-radius:20px;padding:20px 16px;cursor:pointer;text-align:left;transition:transform .2s;position:relative;width:100%;text-decoration:none;display:block}
  .btn:hover{transform:translateY(-4px) scale(1.02)}
  .btn:active{transform:scale(.96)}
  .num{font-size:.7rem;font-weight:900;opacity:.75;color:white;display:block;text-transform:uppercase;letter-spacing:1px}
  .icon{font-size:1.8rem;margin:5px 0 4px;display:block}
  .title{font-size:.95rem;font-weight:900;color:white;line-height:1.25;display:block}
  .arrow{position:absolute;bottom:12px;right:12px;background:rgba(255,255,255,.3);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:1.1rem}
  .g{background:linear-gradient(135deg,#22c55e,#16a34a)}
  .b{background:linear-gradient(135deg,#38bdf8,#0284c7)}
  .y{background:linear-gradient(135deg,#fbbf24,#d97706)}
  .p{background:linear-gradient(135deg,#c084fc,#9333ea)}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <div class="card">
    <div class="header">
      <p class="sub">Bienvenidos a nuestra:</p>
      <h1><span class="line1">Desarrollo</span><br><span class="line2">Psicomotriz</span></h1>
    </div>
    <div class="grid">
      <a href="/modulo/mover" class="btn g">
        <span class="num">1. Módulo</span>
        <span class="icon">🎯</span>
        <span class="title">"Mover y reconocer"</span>
        <span class="arrow">›</span>
      </a>
      <a href="/modulo/rompecabezas" class="btn b">
        <span class="num">2. Módulo</span>
        <span class="icon">🧩</span>
        <span class="title">"Rompecabezas interactivo"</span>
        <span class="arrow">›</span>
      </a>
      <a href="/modulo/dibujo" class="btn y">
        <span class="num">3. Módulo</span>
        <span class="icon">🎨</span>
        <span class="title">"Dibujo con movimiento"</span>
        <span class="arrow">›</span>
      </a>
      <a href="/modulo/imitar" class="btn p">
        <span class="num">4. Módulo</span>
        <span class="icon">🧸</span>
        <span class="title">"Imitar movimientos"</span>
        <span class="arrow">›</span>
      </a>
    </div>
  </div>
</div>
<script>
  const sc=document.getElementById('stars');
  for(let i=0;i<50;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s;`;
    sc.appendChild(s);
  }
</script>
</body>
</html>
