<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rompecabezas Interactivo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#1a0a2e,#2d1b69,#1a2a4a);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden}
  .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .star{position:absolute;background:white;border-radius:50%;animation:twinkle 2s infinite alternate}
  @keyframes twinkle{from{opacity:.2}to{opacity:1}}
  .container{position:relative;z-index:10;width:100%;max-width:1100px;padding:16px}

  .header{background:rgba(255,255,255,.97);border-radius:24px;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .header-left{display:flex;align-items:center;gap:12px}
  .back-btn{background:#f3f4f6;border:none;border-radius:50px;padding:8px 16px;font-family:'Nunito',sans-serif;font-weight:700;color:#555;font-size:.85rem;cursor:pointer}
  .header h2{font-size:1.1rem;font-weight:900;color:#7c3aed;font-family:'Fredoka One',cursive}
  .puntos{background:linear-gradient(135deg,#c084fc,#9333ea);color:white;border-radius:50px;padding:6px 16px;font-weight:900;font-size:.9rem}

  .selector{background:rgba(255,255,255,.97);border-radius:24px;padding:16px 20px;margin-bottom:14px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .selector h3{font-size:.95rem;font-weight:900;color:#444;margin-bottom:12px;text-align:center}
  .puzzles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .puzzle-btn{border:3px solid #e5e7eb;border-radius:16px;padding:12px;text-align:center;cursor:pointer;background:white;transition:all .3s;font-family:'Nunito',sans-serif}
  .puzzle-btn:hover{border-color:#9333ea;transform:scale(1.03)}
  .puzzle-btn.activo{border-color:#9333ea;background:#ede9fe;box-shadow:0 4px 15px rgba(147,51,234,.3)}
  .puzzle-thumb{width:70px;height:70px;border-radius:12px;display:block;margin:0 auto 6px}
  .puzzle-nombre{font-size:.9rem;font-weight:900;color:#444;font-family:'Fredoka One',cursive}

  .juego-area{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}

  .panel{background:rgba(255,255,255,.97);border-radius:24px;padding:18px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .panel-titulo{font-size:.8rem;font-weight:900;color:#666;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;text-align:center}
  .piezas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}

  /* Cada pieza en el panel es un canvas */
  .pieza-slot{position:relative;aspect-ratio:1;border-radius:10px;overflow:visible}
  .pieza-canvas{width:100%;height:100%;border-radius:8px;display:block;cursor:grab;transition:transform .15s,box-shadow .15s;touch-action:none;user-select:none}
  .pieza-canvas:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(0,0,0,.35)}
  .pieza-canvas.usada{opacity:.2;pointer-events:none;cursor:default}

  /* Canvas fantasma que sigue el cursor al arrastrar */
  #ghost-canvas{position:fixed;pointer-events:none;z-index:999;border-radius:10px;display:none;opacity:.85;box-shadow:0 8px 30px rgba(0,0,0,.5)}

  .tablero-wrap{position:relative;width:100%;aspect-ratio:1}
  .tablero-canvas{width:100%;height:100%;border-radius:16px;display:block;box-shadow:0 6px 24px rgba(0,0,0,.3)}

  .progreso-card{background:rgba(255,255,255,.97);border-radius:24px;padding:16px 22px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .progreso-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .progreso-header span{font-weight:900;color:#444;font-size:.9rem}
  .barra-bg{background:#e5e7eb;border-radius:50px;height:14px;overflow:hidden}
  .barra-fill{background:linear-gradient(135deg,#c084fc,#9333ea);height:100%;border-radius:50px;transition:width .5s ease;width:0%}

  .botones{display:flex;gap:12px;justify-content:space-between;margin-top:12px}
  .btn-reiniciar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:50px;padding:10px 22px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:900;color:white;cursor:pointer}
  .btn-nuevo{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#c084fc,#9333ea);border:none;border-radius:50px;padding:10px 22px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:900;color:white;cursor:pointer}

  .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center}
  .overlay.show{display:flex}
  .overlay-card{background:white;border-radius:32px;padding:40px;text-align:center;max-width:400px;animation:popIn .4s ease}
  @keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  .overlay-canvas{width:150px;height:150px;border-radius:20px;margin:0 auto 16px;display:block;box-shadow:0 8px 24px rgba(0,0,0,.2)}
  .overlay-title{font-size:1.8rem;font-weight:900;color:#7c3aed;margin-bottom:8px;font-family:'Fredoka One',cursive}
  .overlay-desc{font-size:1rem;color:#555;margin-bottom:24px}
  .overlay-btn{background:linear-gradient(135deg,#c084fc,#9333ea);border:none;border-radius:50px;padding:14px 36px;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:900;color:white;cursor:pointer}

  canvas.confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99;display:none}
  canvas.confetti-canvas.show{display:block}

  /* Feedback visual al soltar pieza */
  @keyframes flashOk{0%{box-shadow:0 0 0 0 rgba(34,197,94,.7)}100%{box-shadow:0 0 0 18px rgba(34,197,94,0)}}
  @keyframes flashErr{0%{box-shadow:0 0 0 0 rgba(239,68,68,.7)}100%{box-shadow:0 0 0 18px rgba(239,68,68,0)}}
  .feedback-ok{animation:flashOk .5s ease-out}
  .feedback-err{animation:flashErr .5s ease-out}

  @media(max-width:600px){
    .juego-area{grid-template-columns:1fr}
    .puzzles-grid{grid-template-columns:repeat(3,1fr)}
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<canvas class="confetti-canvas" id="confetti"></canvas>
<!-- Canvas fantasma para arrastre -->
<canvas id="ghost-canvas" width="90" height="90"></canvas>

<div class="container">
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="history.back()">← Menú</button>
      <h2>🧩 Rompecabezas Interactivo</h2>
    </div>
    <div class="puntos">⭐ <span id="puntos">0</span> pts</div>
  </div>

  <div class="selector">
    <h3>🎯 Elige tu animal</h3>
    <div class="puzzles-grid" id="puzzles-grid"></div>
  </div>

  <div class="juego-area">
    <div class="panel">
      <div class="panel-titulo">🧩 Piezas — arrástralas</div>
      <div class="piezas-grid" id="piezas-grid"></div>
    </div>
    <div class="panel">
      <div class="panel-titulo">📋 Coloca las piezas aquí</div>
      <div class="tablero-wrap">
        <canvas class="tablero-canvas" id="tablero-canvas" width="360" height="360"></canvas>
      </div>
    </div>
  </div>

  <div class="progreso-card">
    <div class="progreso-header">
      <span id="progreso-texto">0 de 9 piezas colocadas</span>
      <span id="progreso-emoji">🧩🧩🧩🧩🧩🧩🧩🧩🧩</span>
    </div>
    <div class="barra-bg"><div class="barra-fill" id="barra-fill"></div></div>
  </div>

  <div class="botones">
    <button class="btn-reiniciar" onclick="reiniciar()">🔄 Reiniciar</button>
    <button class="btn-nuevo" onclick="siguientePuzzle()">🎲 Cambiar animal</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-card">
    <canvas class="overlay-canvas" id="overlay-canvas" width="150" height="150"></canvas>
    <div class="overlay-title" id="overlay-title">🏆 ¡Completado!</div>
    <div class="overlay-desc" id="overlay-desc">¡Muy bien!</div>
    <button class="overlay-btn" onclick="cerrarOverlay()">🎲 ¡Jugar de nuevo!</button>
  </div>
</div>

<script>
// ── ESTRELLAS ──────────────────────────────────────────────────
(()=>{
  const sc=document.getElementById('stars');
  for(let i=0;i<50;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s;`;
    sc.appendChild(s);
  }
})();

// ── DIBUJO ANIMALES ────────────────────────────────────────────
const ANIMALES = {
  tigre:(ctx,w,h)=>{
    ctx.fillStyle='#FF8C00';ctx.fillRect(0,0,w,h);
    ctx.fillStyle='#FFA500';ctx.beginPath();ctx.arc(w/2,h*.46,w*.38,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FF7000';
    ctx.beginPath();ctx.arc(w*.24,h*.2,w*.1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.76,h*.2,w*.1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFB6C1';
    ctx.beginPath();ctx.arc(w*.24,h*.2,w*.055,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.76,h*.2,w*.055,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFD28C';ctx.beginPath();ctx.ellipse(w/2,h*.56,w*.24,h*.18,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#8B4513';ctx.lineWidth=w*.042;ctx.lineCap='round';
    [[w*.17,h*.24,w*.29,h*.38],[w*.83,h*.24,w*.71,h*.38],[w*.09,h*.42,w*.24,h*.48],[w*.91,h*.42,w*.76,h*.48]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
    for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(w/2+i*w*.1,h*.1);ctx.lineTo(w/2+i*w*.07,h*.27);ctx.stroke();}
    ctx.fillStyle='white';ctx.beginPath();ctx.arc(w*.36,h*.43,w*.085,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.64,h*.43,w*.085,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3d7a00';ctx.beginPath();ctx.arc(w*.36,h*.43,w*.055,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.64,h*.43,w*.055,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='black';ctx.beginPath();ctx.arc(w*.36,h*.43,w*.028,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.64,h*.43,w*.028,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.75)';ctx.beginPath();ctx.arc(w*.375,h*.42,w*.015,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.655,h*.42,w*.015,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FF6688';ctx.beginPath();ctx.ellipse(w/2,h*.57,w*.06,h*.038,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#8B4513';ctx.lineWidth=w*.025;
    ctx.beginPath();ctx.moveTo(w/2,h*.608);ctx.lineTo(w*.42,h*.666);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w/2,h*.608);ctx.lineTo(w*.58,h*.666);ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=w*.012;
    [[w*.14,h*.575,w*.41,h*.575],[w*.14,h*.625,w*.41,h*.625],[w*.86,h*.575,w*.59,h*.575],[w*.86,h*.625,w*.59,h*.625]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  },
  panda:(ctx,w,h)=>{
    ctx.fillStyle='#90EE90';ctx.fillRect(0,0,w,h);
    ctx.fillStyle='white';ctx.beginPath();ctx.arc(w/2,h*.46,w*.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2a2a2a';
    ctx.beginPath();ctx.arc(w*.21,h*.19,w*.12,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.79,h*.19,w*.12,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(w*.35,h*.43,w*.12,h*.1,Math.PI/6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(w*.65,h*.43,w*.12,h*.1,-Math.PI/6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath();ctx.arc(w*.355,h*.43,w*.065,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.645,h*.43,w*.065,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3d2fb5';
    ctx.beginPath();ctx.arc(w*.355,h*.43,w*.04,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.645,h*.43,w*.04,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='black';
    ctx.beginPath();ctx.arc(w*.357,h*.43,w*.022,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.647,h*.43,w*.022,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.7)';
    ctx.beginPath();ctx.arc(w*.372,h*.42,w*.013,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.662,h*.42,w*.013,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f5f5f5';ctx.beginPath();ctx.ellipse(w/2,h*.58,w*.2,h*.13,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';ctx.beginPath();ctx.ellipse(w/2,h*.54,w*.058,h*.037,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#555';ctx.lineWidth=w*.022;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(w/2,h*.577);ctx.lineTo(w*.43,h*.636);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w/2,h*.577);ctx.lineTo(w*.57,h*.636);ctx.stroke();
  },
  elefante:(ctx,w,h)=>{
    ctx.fillStyle='#87CEEB';ctx.fillRect(0,0,w,h);
    ctx.fillStyle='#9090A8';
    ctx.beginPath();ctx.ellipse(w*.14,h*.44,w*.16,h*.26,Math.PI/6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(w*.86,h*.44,w*.16,h*.26,-Math.PI/6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFB6C1';
    ctx.beginPath();ctx.ellipse(w*.15,h*.44,w*.085,h*.16,Math.PI/6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(w*.85,h*.44,w*.085,h*.16,-Math.PI/6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#A8A8B8';ctx.beginPath();ctx.arc(w/2,h*.42,w*.39,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#B8B8C8';ctx.beginPath();ctx.ellipse(w/2,h*.28,w*.28,h*.15,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath();ctx.arc(w*.36,h*.39,w*.065,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.64,h*.39,w*.065,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4a3200';
    ctx.beginPath();ctx.arc(w*.36,h*.39,w*.038,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.64,h*.39,w*.038,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.65)';
    ctx.beginPath();ctx.arc(w*.375,h*.38,w*.016,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(w*.655,h*.38,w*.016,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#A8A8B8';
    ctx.beginPath();ctx.moveTo(w*.41,h*.55);ctx.bezierCurveTo(w*.3,h*.7,w*.27,h*.83,w*.38,h*.92);ctx.bezierCurveTo(w*.44,h*.97,w*.56,h*.97,w*.6,h*.88);ctx.bezierCurveTo(w*.62,h*.82,w*.57,h*.7,w*.59,h*.55);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#9090A8';ctx.lineWidth=w*.012;
    for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(w*.36+i*w*.04,h*(.63+i*.074));ctx.lineTo(w*.55+i*w*.01,h*(.63+i*.074));ctx.stroke();}
    ctx.strokeStyle='#fffde0';ctx.lineWidth=w*.034;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(w*.42,h*.62);ctx.bezierCurveTo(w*.3,h*.7,w*.27,h*.8,w*.31,h*.85);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w*.58,h*.62);ctx.bezierCurveTo(w*.7,h*.7,w*.73,h*.8,w*.69,h*.85);ctx.stroke();
  }
};

const PUZZLES=[
  {id:1,nombre:'Tigre',   emoji:'🐯',drawFn:ANIMALES.tigre},
  {id:2,nombre:'Panda',   emoji:'🐼',drawFn:ANIMALES.panda},
  {id:3,nombre:'Elefante',emoji:'🐘',drawFn:ANIMALES.elefante}
];

// Offscreen 360×360
const OFFSCREENS={};
PUZZLES.forEach(p=>{
  const c=document.createElement('canvas');c.width=360;c.height=360;
  p.drawFn(c.getContext('2d'),360,360);
  OFFSCREENS[p.id]=c;
});

// ── ESTADO GLOBAL ──────────────────────────────────────────────
const GRID=3, BOARD=360, CELL=BOARD/GRID;
let puzzleActual=null, piezasColocadas=0, puntos=0;
let puzzleIdx=0;
let ordenMezclado=[];
const colocadas=Array(9).fill(false);

// Estado drag via pointer events
let dragging=false;
let dragIdx=null;       // índice original de la pieza (0-8)
let dragElem=null;      // canvas DOM de la pieza
let ghostCanvas=document.getElementById('ghost-canvas');
let ghostCtx=ghostCanvas.getContext('2d');
let offsetX=0,offsetY=0; // offset dentro de la pieza al hacer click

function mezclar(a){return[...a].sort(()=>Math.random()-.5);}

// ── SELECTOR ──────────────────────────────────────────────────
function renderSelector(){
  const grid=document.getElementById('puzzles-grid');
  grid.innerHTML='';
  PUZZLES.forEach((p,i)=>{
    const thumb=document.createElement('canvas');
    thumb.className='puzzle-thumb';thumb.width=70;thumb.height=70;
    p.drawFn(thumb.getContext('2d'),70,70);
    const btn=document.createElement('button');
    btn.className='puzzle-btn'+(i===puzzleIdx?' activo':'');
    btn.appendChild(thumb);
    const label=document.createElement('div');
    label.className='puzzle-nombre';label.textContent=p.emoji+' '+p.nombre;
    btn.appendChild(label);
    btn.onclick=()=>{
      puzzleIdx=i;
      document.querySelectorAll('.puzzle-btn').forEach((b,j)=>b.classList.toggle('activo',j===i));
      puntos=0;document.getElementById('puntos').textContent='0';
      seleccionarPuzzle(PUZZLES[i]);
    };
    grid.appendChild(btn);
  });
}

// ── SELECCIONAR PUZZLE ────────────────────────────────────────
function seleccionarPuzzle(puzzle){
  puzzleActual=puzzle;
  piezasColocadas=0;
  colocadas.fill(false);
  dragging=false;dragIdx=null;dragElem=null;
  ghostCanvas.style.display='none';
  ordenMezclado=mezclar([0,1,2,3,4,5,6,7,8]);
  actualizarProgreso(0);
  renderPiezas(puzzle);
  dibujarTablero();
}

// ── PIEZAS ────────────────────────────────────────────────────
function renderPiezas(puzzle){
  const grid=document.getElementById('piezas-grid');
  grid.innerHTML='';
  const off=OFFSCREENS[puzzle.id];

  ordenMezclado.forEach(origIdx=>{
    const col=origIdx%3,row=Math.floor(origIdx/3);
    const slot=document.createElement('div');
    slot.className='pieza-slot';

    const c=document.createElement('canvas');
    c.className='pieza-canvas';
    c.width=100;c.height=100;
    c.dataset.idx=origIdx;
    const cc=c.getContext('2d');
    cc.save();
    cc.beginPath();
    if(cc.roundRect) cc.roundRect(2,2,96,96,10); else{cc.rect(2,2,96,96);}
    cc.clip();
    cc.drawImage(off,col*CELL,row*CELL,CELL,CELL,0,0,100,100);
    cc.restore();
    cc.strokeStyle='rgba(255,255,255,.75)';cc.lineWidth=3;
    cc.beginPath();
    if(cc.roundRect) cc.roundRect(2,2,96,96,10); else cc.rect(2,2,96,96);
    cc.stroke();
    cc.fillStyle='rgba(0,0,0,.45)';cc.fillRect(2,2,22,18);
    cc.fillStyle='white';cc.font='bold 11px Nunito,sans-serif';cc.fillText(origIdx+1,7,15);

    // Pointer events para arrastre
    c.addEventListener('pointerdown',e=>startDrag(e,origIdx,c));
    slot.appendChild(c);
    grid.appendChild(slot);
  });
}

// ── DRAG: INICIO ──────────────────────────────────────────────
function startDrag(e,origIdx,elem){
  if(elem.classList.contains('usada'))return;
  e.preventDefault();
  dragging=true;
  dragIdx=origIdx;
  dragElem=elem;

  const rect=elem.getBoundingClientRect();
  offsetX=e.clientX-rect.left;
  offsetY=e.clientY-rect.top;

  // Dibujar pieza en ghost canvas
  ghostCanvas.width=rect.width;
  ghostCanvas.height=rect.height;
  ghostCtx.clearRect(0,0,ghostCanvas.width,ghostCanvas.height);
  ghostCtx.drawImage(elem,0,0,ghostCanvas.width,ghostCanvas.height);
  ghostCanvas.style.width=rect.width+'px';
  ghostCanvas.style.height=rect.height+'px';
  ghostCanvas.style.display='block';
  moveGhost(e.clientX,e.clientY);

  elem.style.opacity='0.3';

  document.addEventListener('pointermove',onMove);
  document.addEventListener('pointerup',onUp);
  document.addEventListener('pointercancel',onUp);
}

function moveGhost(cx,cy){
  ghostCanvas.style.left=(cx-offsetX)+'px';
  ghostCanvas.style.top=(cy-offsetY)+'px';
}

function onMove(e){
  if(!dragging)return;
  e.preventDefault();
  moveGhost(e.clientX,e.clientY);
  // Highlight de la celda bajo el cursor
  const cell=getCellFromXY(e.clientX,e.clientY);
  if(cell!==null&&!colocadas[cell]) highlightCell(cell,'rgba(147,51,234,.35)');
  else dibujarTablero();
}

function onUp(e){
  if(!dragging)return;
  document.removeEventListener('pointermove',onMove);
  document.removeEventListener('pointerup',onUp);
  document.removeEventListener('pointercancel',onUp);

  ghostCanvas.style.display='none';
  if(dragElem) dragElem.style.opacity='';

  const cell=getCellFromXY(e.clientX,e.clientY);
  if(cell===null||colocadas[cell]){
    dibujarTablero();
    dragging=false;dragIdx=null;dragElem=null;
    return;
  }

  if(dragIdx===cell){
    // ✅ CORRECTO
    colocadas[cell]=true;
    dibujarTablero();
    dragElem.classList.add('usada');
    puntos+=10;
    document.getElementById('puntos').textContent=puntos;
    piezasColocadas++;
    actualizarProgreso(piezasColocadas);
    flashTableroCell(cell,'ok');
    if(piezasColocadas===9) setTimeout(completarPuzzle,700);
  } else {
    // ❌ INCORRECTO
    flashTableroCell(cell,'err');
    setTimeout(dibujarTablero,500);
  }

  dragging=false;dragIdx=null;dragElem=null;
}

// ── COORDENADA CELDA ──────────────────────────────────────────
function getCellFromXY(cx,cy){
  const canvas=document.getElementById('tablero-canvas');
  const rect=canvas.getBoundingClientRect();
  if(cx<rect.left||cx>rect.right||cy<rect.top||cy>rect.bottom) return null;
  const sx=BOARD/rect.width, sy=BOARD/rect.height;
  const bx=(cx-rect.left)*sx, by=(cy-rect.top)*sy;
  const col=Math.floor(bx/CELL), row=Math.floor(by/CELL);
  if(col<0||col>=GRID||row<0||row>=GRID) return null;
  return row*GRID+col;
}

// ── TABLERO ───────────────────────────────────────────────────
function dibujarTablero(){
  const canvas=document.getElementById('tablero-canvas');
  const ctx=canvas.getContext('2d');
  const off=OFFSCREENS[puzzleActual.id];
  ctx.clearRect(0,0,BOARD,BOARD);

  for(let row=0;row<GRID;row++){
    for(let col=0;col<GRID;col++){
      const idx=row*GRID+col;
      const x=col*CELL,y=row*CELL;
      if(colocadas[idx]){
        ctx.save();
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(x+3,y+3,CELL-6,CELL-6,8); else ctx.rect(x+3,y+3,CELL-6,CELL-6);
        ctx.clip();
        ctx.drawImage(off,x,y,CELL,CELL,x+3,y+3,CELL-6,CELL-6);
        ctx.restore();
        ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=2;
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(x+3,y+3,CELL-6,CELL-6,8); else ctx.rect(x+3,y+3,CELL-6,CELL-6);
        ctx.stroke();
      } else {
        ctx.fillStyle='rgba(0,0,20,.5)';
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(x+4,y+4,CELL-8,CELL-8,8); else ctx.rect(x+4,y+4,CELL-8,CELL-8);
        ctx.fill();
        ctx.setLineDash([6,4]);ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=2;
        ctx.beginPath();
        if(ctx.roundRect) ctx.roundRect(x+4,y+4,CELL-8,CELL-8,8); else ctx.rect(x+4,y+4,CELL-8,CELL-8);
        ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle='rgba(255,255,255,.32)';ctx.font='bold 20px Nunito,sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(idx+1,x+CELL/2,y+CELL/2);
      }
    }
  }
  // Líneas cuadrícula
  ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=2;ctx.setLineDash([]);
  for(let i=1;i<GRID;i++){
    ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,BOARD);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(BOARD,i*CELL);ctx.stroke();
  }
}

function highlightCell(idx,color){
  dibujarTablero();
  const canvas=document.getElementById('tablero-canvas');
  const ctx=canvas.getContext('2d');
  const col=idx%GRID,row=Math.floor(idx/GRID);
  const x=col*CELL,y=row*CELL;
  ctx.fillStyle=color;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(x+4,y+4,CELL-8,CELL-8,8); else ctx.rect(x+4,y+4,CELL-8,CELL-8);
  ctx.fill();
  ctx.strokeStyle=color.includes('147')? 'rgba(196,132,252,.9)':'rgba(239,68,68,.9)';
  ctx.lineWidth=3;ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(x+4,y+4,CELL-8,CELL-8,8); else ctx.rect(x+4,y+4,CELL-8,CELL-8);
  ctx.stroke();
}

function flashTableroCell(idx,tipo){
  dibujarTablero();
  const canvas=document.getElementById('tablero-canvas');
  const ctx=canvas.getContext('2d');
  const col=idx%GRID,row=Math.floor(idx/GRID);
  const x=col*CELL,y=row*CELL;
  const color=tipo==='ok'?'rgba(34,197,94,.45)':'rgba(239,68,68,.45)';
  ctx.fillStyle=color;
  ctx.beginPath();
  if(ctx.roundRect) ctx.roundRect(x+2,y+2,CELL-4,CELL-4,8); else ctx.rect(x+2,y+2,CELL-4,CELL-4);
  ctx.fill();
}

// ── PROGRESO ──────────────────────────────────────────────────
function actualizarProgreso(n){
  document.getElementById('barra-fill').style.width=(n/9*100)+'%';
  document.getElementById('progreso-texto').textContent=`${n} de 9 piezas colocadas`;
  let e='';for(let i=0;i<9;i++)e+=i<n?'✅':'🧩';
  document.getElementById('progreso-emoji').textContent=e;
}

// ── COMPLETAR ─────────────────────────────────────────────────
function completarPuzzle(){
  lanzarConfetti();
  const oc=document.getElementById('overlay-canvas');
  puzzleActual.drawFn(oc.getContext('2d'),150,150);
  document.getElementById('overlay-title').textContent=`🏆 ¡Es un ${puzzleActual.nombre}!`;
  document.getElementById('overlay-desc').textContent=`¡Completaste el rompecabezas con ${puntos} puntos! ¡Eres increíble!`;
  setTimeout(()=>document.getElementById('overlay').classList.add('show'),400);
}

function cerrarOverlay(){
  document.getElementById('overlay').classList.remove('show');
  reiniciar();
}

function reiniciar(){
  puntos=0;document.getElementById('puntos').textContent='0';
  seleccionarPuzzle(puzzleActual);
}

function siguientePuzzle(){
  puzzleIdx=(puzzleIdx+1)%PUZZLES.length;
  document.querySelectorAll('.puzzle-btn').forEach((b,i)=>b.classList.toggle('activo',i===puzzleIdx));
  puntos=0;document.getElementById('puntos').textContent='0';
  seleccionarPuzzle(PUZZLES[puzzleIdx]);
}

// ── CONFETI ───────────────────────────────────────────────────
function lanzarConfetti(){
  const cv=document.getElementById('confetti');cv.classList.add('show');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const ctx=cv.getContext('2d');
  const p=Array.from({length:150},()=>({x:Math.random()*cv.width,y:-20,r:Math.random()*8+4,color:`hsl(${Math.random()*360},90%,60%)`,speed:Math.random()*3+2,swing:Math.random()*3-1.5}));
  let f=0;
  (function go(){ctx.clearRect(0,0,cv.width,cv.height);p.forEach(pt=>{ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fillStyle=pt.color;ctx.fill();pt.y+=pt.speed;pt.x+=pt.swing;if(pt.y>cv.height){pt.y=-10;pt.x=Math.random()*cv.width;}});f++;if(f<200)requestAnimationFrame(go);else cv.classList.remove('show');})();
}

// ── INICIO ────────────────────────────────────────────────────
renderSelector();
seleccionarPuzzle(PUZZLES[0]);
</script>
