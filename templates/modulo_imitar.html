<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imitar Movimientos</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#1a0533,#0d1b4b);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px}
  .header{background:rgba(255,255,255,.97);border-radius:20px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;width:100%;max-width:820px;margin-bottom:12px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .back-btn{background:#f3f4f6;border:none;border-radius:50px;padding:8px 16px;font-family:'Nunito',sans-serif;font-weight:700;color:#555;cursor:pointer;font-size:.85rem;text-decoration:none}
  .header h2{font-size:1rem;font-weight:900;color:#7c3aed}
  .puntos-box{background:linear-gradient(135deg,#c084fc,#9333ea);color:white;border-radius:50px;padding:6px 16px;font-weight:900;font-size:.9rem}
  .game-area{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:820px}
  .card{background:rgba(255,255,255,.97);border-radius:20px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .cam-label{font-size:.8rem;font-weight:700;color:#666;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .cam-wrap{position:relative;border-radius:12px;overflow:hidden;background:#111}
  video{width:100%;display:block;transform:scaleX(-1);border-radius:12px}
  canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
  .instruccion-card{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:260px}
  .mov-emoji{font-size:4rem;animation:bounce 1s infinite alternate}
  @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
  .mov-texto{font-size:1.2rem;font-weight:900;color:#1e1b4b;line-height:1.25;max-width:200px}
  .cuenta{font-size:5rem;font-weight:900;color:#7c3aed;line-height:1;min-height:80px;display:flex;align-items:center;justify-content:center}
  .estado{padding:10px 20px;border-radius:50px;font-weight:900;font-size:.9rem;color:white;background:linear-gradient(135deg,#a78bfa,#7c3aed);transition:background .3s;text-align:center}
  .estado.ok{background:linear-gradient(135deg,#22c55e,#16a34a)}
  .estado.mal{background:linear-gradient(135deg,#ef4444,#dc2626)}
  .vidas{font-size:1.2rem}
  .progreso-card{width:100%;max-width:820px;background:rgba(255,255,255,.97);border-radius:20px;padding:14px 20px;margin-top:12px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .prog-header{display:flex;justify-content:space-between;font-size:.85rem;font-weight:700;color:#555;margin-bottom:8px}
  .barra-bg{background:#e5e7eb;border-radius:50px;height:12px;overflow:hidden}
  .barra-fill{background:linear-gradient(135deg,#c084fc,#9333ea);height:100%;border-radius:50px;transition:width .5s}
  .hand-badge{position:absolute;top:8px;right:8px;background:#22c55e;color:white;font-size:.7rem;font-weight:900;padding:4px 10px;border-radius:50px;opacity:0;transition:opacity .3s}
  .hand-badge.show{opacity:1}
  #btn-iniciar{display:block;width:100%;max-width:820px;margin:14px 0 0;background:linear-gradient(135deg,#22c55e,#16a34a);color:white;border:none;border-radius:20px;padding:18px;font-family:'Nunito',sans-serif;font-size:1.3rem;font-weight:900;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:pulsebtn 1.2s infinite alternate}
  @keyframes pulsebtn{from{transform:scale(1)}to{transform:scale(1.03)}}
</style>
</head>
<body>

<div class="header">
  <a href="/" class="back-btn">← Menú</a>
  <h2>🧸 Imitar Movimientos</h2>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="vidas" id="vidas">❤️❤️❤️</div>
    <div class="puntos-box">⭐ <span id="puntos">0</span></div>
  </div>
</div>

<div class="game-area">
  <div class="card">
    <div class="cam-label"><div class="dot"></div> Tu cámara</div>
    <div class="cam-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="hand-badge" id="hand-badge">✋ Mano detectada</div>
    </div>
  </div>

  <div class="card instruccion-card">
    <div class="mov-emoji" id="mov-emoji">🤖</div>
    <div class="mov-texto" id="mov-texto">Toca el botón verde para comenzar</div>
    <div class="cuenta" id="cuenta">👇</div>
    <div class="estado" id="estado">Listo para jugar</div>
  </div>
</div>

<div class="progreso-card">
  <div class="prog-header">
    <span id="prog-texto">Movimiento 0 de 5</span>
    <span>⭐⭐⭐</span>
  </div>
  <div class="barra-bg"><div class="barra-fill" id="barra" style="width:0%"></div></div>
</div>

<button id="btn-iniciar" onclick="arrancar()">▶ Tocar aquí para comenzar!</button>

<script>
// ── AUDIOS con tu voz ──
function audio(nombre) {
  const a = new Audio('/static/audio/' + nombre + '.mp3');
  a.play().catch(e => console.log('audio error:', e));
  return a;
}

function audioSerie(nombres, delay=2500) {
  nombres.forEach((n, i) => setTimeout(() => audio(n), i * delay));
}

const MOVIMIENTOS = [
  { instruccion:"Muestra 4 dedos",        emoji:"4️⃣", tipo:"cuatro_dedos", corto:"mov1_corto", largo:"mov1_largo" },
  { instruccion:"Haz un puño cerrado",     emoji:"✊",  tipo:"puno",         corto:"mov2_corto", largo:"mov2_largo" },
  { instruccion:"Señala con un solo dedo", emoji:"☝️", tipo:"un_dedo",      corto:"mov3_corto", largo:"mov3_largo" },
  { instruccion:"Muestra dos dedos en V",  emoji:"✌️", tipo:"dos_dedos",    corto:"mov4_corto", largo:"mov4_largo" },
  { instruccion:"Abre toda la mano",       emoji:"🖐",  tipo:"palma_abierta",corto:"mov5_corto", largo:"mov5_largo" }
];

let indice=0, puntos=0, vidas=3, esperando=false, detectadoOk=false, timerDet=null;
let juegoArrancado=false;

function detectarGesto(lm) {
  const dedos = [
    lm[8].y  < lm[6].y,
    lm[12].y < lm[10].y,
    lm[16].y < lm[14].y,
    lm[20].y < lm[18].y
  ];
  const abiertos = dedos.filter(Boolean).length;
  const pulgAbierto = lm[4].x < lm[3].x;

  switch (MOVIMIENTOS[indice]?.tipo) {
    case 'cuatro_dedos':  return abiertos === 4 && !pulgAbierto;
    case 'puno':          return abiertos === 0 && !pulgAbierto;
    case 'un_dedo':       return dedos[0] && abiertos === 1;
    case 'dos_dedos':     return dedos[0] && dedos[1] && abiertos === 2;
    case 'palma_abierta': return abiertos === 4 && pulgAbierto;
    default: return false;
  }
}

function iniciarMovimiento() {
  if (indice >= MOVIMIENTOS.length) { finJuego(); return; }
  const m = MOVIMIENTOS[indice];
  document.getElementById('mov-emoji').textContent = m.emoji;
  document.getElementById('mov-texto').textContent = m.instruccion;
  document.getElementById('prog-texto').textContent = 'Movimiento ' + (indice+1) + ' de ' + MOVIMIENTOS.length;
  document.getElementById('barra').style.width = ((indice / MOVIMIENTOS.length) * 100) + '%';
  document.getElementById('estado').textContent = '👀 Escucha bien...';
  document.getElementById('estado').className = 'estado';
  document.getElementById('cuenta').textContent = '👂';
  esperando = false; detectadoOk = false;
  audio(m.corto);
  setTimeout(() => audio(m.largo), 2500);
  setTimeout(cuenta, 6000);
}

function cuenta() {
  document.getElementById('estado').textContent = '⏳ Prepárate...';
  audio('preparate');
  setTimeout(() => { document.getElementById('cuenta').textContent = '3'; audio('tres'); }, 1500);
  setTimeout(() => { document.getElementById('cuenta').textContent = '2'; audio('dos');  }, 2800);
  setTimeout(() => { document.getElementById('cuenta').textContent = '1'; audio('uno');  }, 4100);
  setTimeout(() => {
    document.getElementById('cuenta').textContent = '¡YA!';
    document.getElementById('estado').textContent = '🖐 Hazlo ahora!';
    audio('ya');
    esperando = true;
    setTimeout(() => { if (esperando) incorrecto(); }, 6000);
  }, 5400);
}

function correcto() {
  esperando = false;
  puntos += 10;
  document.getElementById('puntos').textContent = puntos;
  document.getElementById('estado').textContent = '✅ Muy bien!';
  document.getElementById('estado').className = 'estado ok';
  audio('muy_bien');
  setTimeout(() => audio('inteligente'), 2000);
  setTimeout(() => { indice++; iniciarMovimiento(); }, 5000);
}

function incorrecto() {
  esperando = false;
  vidas = Math.max(0, vidas - 1);
  document.getElementById('vidas').textContent = '❤️'.repeat(vidas) + '🖤'.repeat(3 - vidas);
  document.getElementById('estado').textContent = '❌ Vuelve a intentarlo!';
  document.getElementById('estado').className = 'estado mal';
  audio('no_preocupes');
  setTimeout(() => audio('intenta'), 2000);
  setTimeout(() => audio(MOVIMIENTOS[indice].largo), 4000);
  setTimeout(cuenta, 7000);
}

function finJuego() {
  document.getElementById('barra').style.width = '100%';
  document.getElementById('mov-emoji').textContent = '🏆';
  document.getElementById('mov-texto').textContent = 'Juego completado!';
  document.getElementById('estado').textContent = puntos + ' puntos';
  document.getElementById('estado').className = 'estado ok';
  audio('felicidades');
  setTimeout(() => audio('campeon'), 3000);
}

function arrancar() {
  if (juegoArrancado) return;
  juegoArrancado = true;
  document.getElementById('btn-iniciar').style.display = 'none';
  audioSerie(['bienvenida_1','bienvenida_2','bienvenida_3','bienvenida_4'], 3000);
  setTimeout(iniciarMovimiento, 13000);
}

// ── CÁMARA Y MEDIAPIPE ──
window.addEventListener('load', () => {
  const video  = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const badge  = document.getElementById('hand-badge');

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
    .then(stream => {
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
      };
    })
    .catch(() => {
      document.getElementById('estado').textContent = 'Activa la camara para jugar';
    });

  let intentos = 0;
  const esperarMP = setInterval(() => {
    intentos++;
    if (typeof Hands !== 'undefined' && typeof Camera !== 'undefined') {
      clearInterval(esperarMP);

      const hands = new Hands({
        locateFile: f => 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/' + f
      });
      hands.setOptions({ maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.7, minTrackingConfidence:0.55 });

      hands.onResults(results => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (results.multiHandLandmarks?.length > 0) {
          badge.classList.add('show');
          const lm = results.multiHandLandmarks[0];
          if (typeof drawConnectors !== 'undefined') {
            drawConnectors(ctx, lm, HAND_CONNECTIONS, { color:'#c084fc', lineWidth:3 });
            drawLandmarks(ctx, lm, { color:'#fff', lineWidth:1, radius:4 });
          }
          if (esperando) {
            const ok = detectarGesto(lm);
            if (ok && !detectadoOk) { detectadoOk=true; timerDet=setTimeout(correcto,800); }
            else if (!ok) { detectadoOk=false; clearTimeout(timerDet); }
          }
        } else {
          badge.classList.remove('show');
          detectadoOk=false;
        }
      });

      const cam = new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width:640, height:480
      });
      cam.start();

    } else if (intentos > 40) {
      clearInterval(esperarMP);
      document.getElementById('estado').textContent = 'Error cargando. Recarga la pagina.';
    }
  }, 500);
});
</script>
</body>
</html>
