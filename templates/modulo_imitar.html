<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imitar Movimientos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#1a0533,#0d1b4b,#0a2a3a);min-height:100vh;display:flex;align-items:center;justify-content:center}
  .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .star{position:absolute;background:white;border-radius:50%;animation:twinkle 2s infinite alternate}
  @keyframes twinkle{from{opacity:.2}to{opacity:1}}
  .container{position:relative;z-index:10;width:100%;max-width:1000px;padding:16px}

  /* HEADER */
  .header{background:rgba(255,255,255,.97);border-radius:24px;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .header-left{display:flex;align-items:center;gap:12px}
  .back-btn{background:#f3f4f6;border:none;border-radius:50px;padding:8px 16px;font-family:'Nunito',sans-serif;font-weight:700;color:#555;cursor:pointer;font-size:.85rem;text-decoration:none}
  .header h2{font-size:1.1rem;font-weight:900;color:#7c3aed}
  .vidas{display:flex;gap:6px;font-size:1.4rem}
  .puntos{background:linear-gradient(135deg,#c084fc,#9333ea);color:white;border-radius:50px;padding:6px 16px;font-weight:900;font-size:.9rem}

  /* GRID PRINCIPAL - 3 columnas */
  .main-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}

  /* CARDS */
  .card{background:rgba(255,255,255,.97);border-radius:24px;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}

  /* ROBOT */
  .robot-emoji{font-size:5rem;display:block;animation:robotBounce 1s infinite alternate}
  @keyframes robotBounce{from{transform:translateY(0) rotate(-3deg)}to{transform:translateY(-10px) rotate(3deg)}}
  .instruccion-box{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border-radius:16px;padding:14px;margin-top:14px;width:100%}
  .instruccion-box p{font-size:.8rem;color:#7c3aed;font-weight:700;margin-bottom:4px}
  .instruccion-texto{font-size:1.2rem;font-weight:900;color:#4c1d95}

  /* CÁMARA */
  .camara-box{width:100%;aspect-ratio:4/3;background:#0a0a0a;border-radius:16px;overflow:hidden;position:relative;border:3px solid #7c3aed;margin-bottom:10px}
  .camara-box video{width:100%;height:100%;object-fit:cover;display:none}
  .camara-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
  .camara-placeholder span:first-child{font-size:2.5rem}
  .camara-placeholder span:last-child{color:#a78bfa;font-weight:900;font-size:.8rem}
  .camara-estado{font-size:.8rem;font-weight:700;color:#7c3aed}

  /* CUENTA */
  .cuenta-numero{font-size:6rem;font-weight:900;color:#7c3aed;line-height:1;animation:pulseCuenta .5s ease infinite alternate}
  @keyframes pulseCuenta{from{transform:scale(1)}to{transform:scale(1.08)}}
  .cuenta-label{font-size:.95rem;font-weight:700;color:#666;margin-top:6px}
  .estado-badge{padding:10px 20px;border-radius:50px;font-size:.9rem;font-weight:900;color:white;margin-top:14px;cursor:pointer}
  .estado-esperando{background:linear-gradient(135deg,#a78bfa,#7c3aed)}
  .estado-correcto{background:linear-gradient(135deg,#22c55e,#16a34a)}
  .estado-incorrecto{background:linear-gradient(135deg,#ef4444,#dc2626)}

  /* FILA INFERIOR */
  .bottom-row{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center}
  .progreso-card{background:rgba(255,255,255,.97);border-radius:24px;padding:18px 24px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .progreso-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .progreso-header span{font-weight:900;color:#444;font-size:.9rem}
  .estrellas{display:flex;gap:4px;font-size:1.3rem}
  .estrella{filter:grayscale(1);transition:filter .3s}
  .estrella.activa{filter:none}
  .barra-bg{background:#e5e7eb;border-radius:50px;height:12px;overflow:hidden}
  .barra-fill{background:linear-gradient(135deg,#c084fc,#9333ea);height:100%;border-radius:50px;transition:width .5s ease}
  .botones{display:flex;flex-direction:column;gap:8px}
  .btn-reiniciar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:50px;padding:10px 20px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:900;color:white;cursor:pointer;white-space:nowrap}
  .btn-siguiente{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#c084fc,#9333ea);border:none;border-radius:50px;padding:10px 20px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:900;color:white;cursor:pointer;white-space:nowrap}
  .btn-siguiente:disabled{opacity:.5;cursor:not-allowed}

  /* OVERLAY */
  .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center}
  .overlay.show{display:flex}
  .overlay-card{background:white;border-radius:32px;padding:40px;text-align:center;max-width:380px;animation:popIn .4s ease}
  @keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  .overlay-emoji{font-size:5rem;display:block;margin-bottom:16px}
  .overlay-title{font-size:2rem;font-weight:900;margin-bottom:8px}
  .overlay-desc{font-size:1rem;color:#666;margin-bottom:24px}
  .overlay-btn{background:linear-gradient(135deg,#c084fc,#9333ea);border:none;border-radius:50px;padding:14px 36px;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:900;color:white;cursor:pointer}
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="container">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <a href="/" class="back-btn">← Menú</a>
      <h2>🧸 Imitar Movimientos</h2>
    </div>
    <div class="vidas" id="vidas">❤️❤️❤️</div>
    <div class="puntos">⭐ <span id="puntos">0</span> pts</div>
  </div>

  <!-- GRID 3 COLUMNAS -->
  <div class="main-grid">

    <!-- COLUMNA 1: ROBOT -->
    <div class="card">
      <span class="robot-emoji" id="robot-emoji">🤖</span>
      <div class="instruccion-box">
        <p>Instrucción:</p>
        <div class="instruccion-texto" id="instruccion-texto">Preparando juego...</div>
      </div>
    </div>

    <!-- COLUMNA 2: CÁMARA -->
    <div class="card">
      <div class="camara-box">
        <video id="camara-video" autoplay playsinline muted></video>
        <div class="camara-placeholder" id="camara-placeholder">
          <span>📷</span>
          <span>Cámara disponible<br>en la nube</span>
        </div>
      </div>
      <div class="camara-estado" id="camara-estado">🔴 Cámara inactiva</div>
    </div>

    <!-- COLUMNA 3: CUENTA REGRESIVA -->
    <div class="card">
      <div class="cuenta-numero" id="cuenta-numero">-</div>
      <div class="cuenta-label" id="cuenta-label">Esperando...</div>
      <div class="estado-badge estado-esperando" id="estado-badge">🎮 Listo para jugar</div>
    </div>

  </div>

  <!-- FILA INFERIOR: PROGRESO + BOTONES -->
  <div class="bottom-row">
    <div class="progreso-card">
      <div class="progreso-header">
        <span id="progreso-texto">Movimiento 0 de 5</span>
        <div class="estrellas" id="estrellas">
          <span class="estrella">⭐</span>
          <span class="estrella">⭐</span>
          <span class="estrella">⭐</span>
        </div>
      </div>
      <div class="barra-bg">
        <div class="barra-fill" id="barra-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="botones">
      <button class="btn-siguiente" id="btn-siguiente" onclick="siguiente()" disabled>Siguiente ›</button>
      <button class="btn-reiniciar" onclick="reiniciar()">🔄 Reiniciar</button>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <span class="overlay-emoji" id="overlay-emoji">🎉</span>
    <div class="overlay-title" id="overlay-title">¡Correcto!</div>
    <div class="overlay-desc" id="overlay-desc">¡Muy bien!</div>
    <button class="overlay-btn" onclick="cerrarOverlay()">¡Continuar!</button>
  </div>
</div>

<script>
  const sc=document.getElementById('stars');
  for(let i=0;i<50;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s;`;
    sc.appendChild(s);
  }

  let movimientos=[], indiceActual=0, puntos=0, vidas=3;
  let contando=false, esperandoRespuesta=false;

  async function cargarMovimientos(){
    const res=await fetch('/imitar/movimientos');
    movimientos=await res.json();
    await fetch('/imitar/instrucciones');
    setTimeout(()=>iniciarMovimiento(),3000);
  }

  function iniciarMovimiento(){
    if(indiceActual>=movimientos.length){completarJuego();return;}
    const mov=movimientos[indiceActual];
    document.getElementById('instruccion-texto').textContent=mov.instruccion;
    document.getElementById('robot-emoji').textContent=mov.emoji;
    document.getElementById('progreso-texto').textContent=`Movimiento ${indiceActual+1} de ${movimientos.length}`;
    document.getElementById('barra-fill').style.width=`${(indiceActual/movimientos.length)*100}%`;
    document.getElementById('btn-siguiente').disabled=true;
    document.getElementById('estado-badge').textContent='👀 Observa el movimiento';
    document.getElementById('estado-badge').className='estado-badge estado-esperando';
    fetch(`/imitar/anunciar/${indiceActual}`)
      .then(()=>setTimeout(()=>iniciarCuenta(),3000));
  }

  function iniciarCuenta(){
    contando=true;
    let cuenta=3;
    document.getElementById('cuenta-label').textContent='¡Prepárate!';
    document.getElementById('cuenta-numero').style.color='#7c3aed';
    document.getElementById('cuenta-numero').textContent=cuenta;
    fetch(`/imitar/contar/${cuenta}`);
    cuenta--;
    const intervalo=setInterval(()=>{
      if(cuenta>0){
        document.getElementById('cuenta-numero').textContent=cuenta;
        fetch(`/imitar/contar/${cuenta}`);
        cuenta--;
      } else {
        clearInterval(intervalo);
        document.getElementById('cuenta-numero').textContent='¡YA!';
        document.getElementById('cuenta-label').textContent='¡Haz el movimiento!';
        document.getElementById('cuenta-numero').style.color='#22c55e';
        document.getElementById('estado-badge').textContent='🖐 ¡Haz el movimiento!';
        fetch('/imitar/ya');
        esperandoRespuesta=true;
        document.getElementById('estado-badge').onclick=()=>simularDeteccion(true);
      }
    },1000);
  }

  function simularDeteccion(correcto){
    if(!esperandoRespuesta)return;
    esperandoRespuesta=false;
    if(correcto){
      puntos+=10;
      document.getElementById('puntos').textContent=puntos;
      document.getElementById('estado-badge').textContent='✅ ¡Correcto!';
      document.getElementById('estado-badge').className='estado-badge estado-correcto';
      fetch(`/imitar/correcto/${indiceActual}`);
      mostrarOverlay('🎉','¡Lo hiciste muy bien!',movimientos[indiceActual].instruccion+' ¡Correcto!',true);
      activarEstrella();
    } else {
      vidas--;
      actualizarVidas();
      document.getElementById('estado-badge').textContent='❌ Incorrecto';
      document.getElementById('estado-badge').className='estado-badge estado-incorrecto';
      fetch('/imitar/incorrecto');
      mostrarOverlay('😅','Movimiento incorrecto','¡Vuelve a intentarlo!',false);
    }
    document.getElementById('btn-siguiente').disabled=false;
  }

  function mostrarOverlay(emoji,titulo,desc,correcto){
    document.getElementById('overlay-emoji').textContent=emoji;
    document.getElementById('overlay-title').textContent=titulo;
    document.getElementById('overlay-title').style.color=correcto?'#16a34a':'#dc2626';
    document.getElementById('overlay-desc').textContent=desc;
    document.getElementById('overlay').classList.add('show');
  }

  function cerrarOverlay(){document.getElementById('overlay').classList.remove('show');}

  function siguiente(){
    indiceActual++;
    cerrarOverlay();
    document.getElementById('cuenta-numero').textContent='-';
    document.getElementById('cuenta-label').textContent='Esperando...';
    iniciarMovimiento();
  }

  function activarEstrella(){
    const estrellas=document.querySelectorAll('.estrella');
    const idx=Math.min(Math.floor(puntos/10)-1,2);
    if(estrellas[idx])estrellas[idx].classList.add('activa');
  }

  function actualizarVidas(){
    document.getElementById('vidas').textContent='❤️'.repeat(Math.max(vidas,0))+'🖤'.repeat(Math.max(3-vidas,0));
  }

  function completarJuego(){
    fetch('/imitar/completado');
    document.getElementById('barra-fill').style.width='100%';
    mostrarOverlay('🏆','¡Juego Completado!',`¡Increíble! Lograste ${puntos} puntos`,true);
  }

  function reiniciar(){
    indiceActual=0;puntos=0;vidas=3;
    document.getElementById('puntos').textContent='0';
    actualizarVidas();
    document.querySelectorAll('.estrella').forEach(e=>e.classList.remove('activa'));
    cerrarOverlay();
    cargarMovimientos();
  }

  async function intentarCamara(){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:true});
      const video=document.getElementById('camara-video');
      video.srcObject=stream;
      video.style.display='block';
      document.getElementById('camara-placeholder').style.display='none';
      document.getElementById('camara-estado').textContent='🟢 Cámara activa';
    }catch(e){
      document.getElementById('camara-estado').textContent='🔴 Cámara no disponible';
    }
  }

  intentarCamara();
  cargarMovimientos();
</script>
</body>
</html>
