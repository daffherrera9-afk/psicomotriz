<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imitar Movimientos</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#1a0533,#0d1b4b);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
  .header{background:rgba(255,255,255,.97);border-radius:20px;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;width:100%;max-width:800px;margin-bottom:14px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .back-btn{background:#f3f4f6;border:none;border-radius:50px;padding:8px 16px;font-family:'Nunito',sans-serif;font-weight:700;color:#555;cursor:pointer;font-size:.85rem;text-decoration:none}
  .header h2{font-size:1rem;font-weight:900;color:#7c3aed}
  .puntos{background:linear-gradient(135deg,#c084fc,#9333ea);color:white;border-radius:50px;padding:6px 16px;font-weight:900;font-size:.9rem}
  .game-area{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:800px}
  .camera-card{background:rgba(255,255,255,.97);border-radius:20px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,.3);position:relative}
  .camera-label{font-size:.8rem;font-weight:700;color:#666;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  video{width:100%;border-radius:12px;display:block;transform:scaleX(-1)}
  canvas{position:absolute;top:16px;left:16px;width:calc(100% - 32px);border-radius:12px;transform:scaleX(-1)}
  .instruccion-card{background:rgba(255,255,255,.97);border-radius:20px;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,.3);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
  .movimiento-emoji{font-size:4rem;animation:bounce 1s infinite alternate}
  @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
  .movimiento-texto{font-size:1.3rem;font-weight:900;color:#1e1b4b;line-height:1.2}
  .cuenta-num{font-size:5rem;font-weight:900;color:#7c3aed;line-height:1}
  .estado{padding:10px 20px;border-radius:50px;font-weight:900;font-size:.9rem;color:white;background:linear-gradient(135deg,#a78bfa,#7c3aed)}
  .estado.correcto{background:linear-gradient(135deg,#22c55e,#16a34a)}
  .estado.incorrecto{background:linear-gradient(135deg,#ef4444,#dc2626)}
  .vidas{font-size:1.3rem}
  .progreso{width:100%;max-width:800px;background:rgba(255,255,255,.97);border-radius:20px;padding:16px 20px;margin-top:14px;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .barra-bg{background:#e5e7eb;border-radius:50px;height:12px;overflow:hidden;margin-top:8px}
  .barra-fill{background:linear-gradient(135deg,#c084fc,#9333ea);height:100%;border-radius:50px;transition:width .5s}
  .prog-header{display:flex;justify-content:space-between;font-size:.85rem;font-weight:700;color:#555}
</style>
</head>
<body>

<div class="header">
  <a href="/" class="back-btn">← Menú</a>
  <h2>🧸 Imitar Movimientos</h2>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="vidas" id="vidas">❤️❤️❤️</div>
    <div class="puntos">⭐ <span id="puntos">0</span></div>
  </div>
</div>

<div class="game-area">
  <div class="camera-card">
    <div class="camera-label"><div class="dot"></div> Tu cámara</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

  <div class="instruccion-card">
    <div class="movimiento-emoji" id="mov-emoji">🤖</div>
    <div class="movimiento-texto" id="mov-texto">Preparando juego...</div>
    <div class="cuenta-num" id="cuenta">-</div>
    <div class="estado" id="estado">🎮 Listo</div>
  </div>
</div>

<div class="progreso">
  <div class="prog-header">
    <span id="prog-texto">Movimiento 0 de 5</span>
    <span id="estrellas">⭐⭐⭐</span>
  </div>
  <div class="barra-bg"><div class="barra-fill" id="barra" style="width:0%"></div></div>
</div>

<script>
const movimientos = [
  {instruccion:"Levanta la mano bien arriba", emoji:"🙋", deteccion:"mano_arriba"},
  {instruccion:"Muestra 5 dedos", emoji:"🖐", deteccion:"cinco_dedos"},
  {instruccion:"Haz un puño cerrado", emoji:"✊", deteccion:"puno"},
  {instruccion:"Señala con el dedo índice", emoji:"☝️", deteccion:"un_dedo"},
  {instruccion:"Muestra la palma abierta", emoji:"✋", deteccion:"palma"}
];

let indice = 0, puntos = 0, vidas = 3, esperando = false, contando = false;

// Voz
function hablar(texto) {
  const u = new SpeechSynthesisUtterance(texto);
  u.lang = 'es-ES';
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

// Detección de gestos
function detectarGesto(landmarks) {
  const dedos = [
    landmarks[8].y < landmarks[6].y,  // índice
    landmarks[12].y < landmarks[10].y, // medio
    landmarks[16].y < landmarks[14].y, // anular
    landmarks[20].y < landmarks[18].y  // meñique
  ];
  const dedosAbiertos = dedos.filter(Boolean).length;
  const manoArriba = landmarks[0].y > 0.7;

  const mov = movimientos[indice]?.deteccion;
  if (mov === 'mano_arriba') return manoArriba;
  if (mov === 'cinco_dedos') return dedosAbiertos === 4;
  if (mov === 'puno') return dedosAbiertos === 0;
  if (mov === 'un_dedo') return dedos[0] && dedosAbiertos === 1;
  if (mov === 'palma') return dedosAbiertos >= 3;
  return false;
}

// Cuenta regresiva
function iniciarCuenta() {
  contando = true;
  let n = 3;
  document.getElementById('cuenta').textContent = n;
  hablar(String(n));
  const iv = setInterval(() => {
    n--;
    document.getElementById('cuenta').textContent = n > 0 ? n : '¡YA!';
    if (n > 0) hablar(String(n));
    else { hablar('Ya!'); clearInterval(iv); esperando = true; contando = false; }
  }, 1000);
}

function iniciarMovimiento() {
  if (indice >= movimientos.length) { completar(); return; }
  const m = movimientos[indice];
  document.getElementById('mov-emoji').textContent = m.emoji;
  document.getElementById('mov-texto').textContent = m.instruccion;
  document.getElementById('prog-texto').textContent = `Movimiento ${indice+1} de ${movimientos.length}`;
  document.getElementById('barra').style.width = `${(indice/movimientos.length)*100}%`;
  document.getElementById('estado').textContent = '👀 Observa';
  document.getElementById('estado').className = 'estado';
  document.getElementById('cuenta').textContent = '-';
  esperando = false;
  hablar(m.instruccion);
  setTimeout(iniciarCuenta, 2500);
}

function correcto() {
  esperando = false;
  puntos += 10;
  document.getElementById('puntos').textContent = puntos;
  document.getElementById('estado').textContent = '✅ ¡Correcto!';
  document.getElementById('estado').className = 'estado correcto';
  hablar('Lo hiciste muy bien!');
  setTimeout(() => { indice++; iniciarMovimiento(); }, 2000);
}

function incorrecto() {
  esperando = false;
  vidas--;
  document.getElementById('vidas').textContent = '❤️'.repeat(Math.max(vidas,0)) + '🖤'.repeat(Math.max(3-vidas,0));
  document.getElementById('estado').textContent = '❌ Incorrecto';
  document.getElementById('estado').className = 'estado incorrecto';
  hablar('Movimiento incorrecto, vuelve a intentarlo');
  setTimeout(iniciarCuenta, 2000);
}

function completar() {
  document.getElementById('barra').style.width = '100%';
  document.getElementById('mov-emoji').textContent = '🏆';
  document.getElementById('mov-texto').textContent = '¡Juego completado!';
  document.getElementById('estado').textContent = `🌟 ${puntos} puntos`;
  document.getElementById('estado').className = 'estado correcto';
  hablar(`Felicidades! Completaste todos los movimientos con ${puntos} puntos!`);
}

// MediaPipe Hands
const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.7, minTrackingConfidence:0.5});

let deteccionOk = false, timerDet = null;

hands.onResults(results => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (results.multiHandLandmarks?.length > 0 && esperando) {
    const ok = detectarGesto(results.multiHandLandmarks[0]);
    if (ok && !deteccionOk) {
      deteccionOk = true;
      timerDet = setTimeout(correcto, 800);
    } else if (!ok) {
      deteccionOk = false;
      clearTimeout(timerDet);
    }
  }
});

// Cámara
const video = document.getElementById('video');
const camera = new Camera(video, {
  onFrame: async () => { await hands.send({image: video}); },
  width:640, height:480
});
camera.start().then(() => {
  setTimeout(() => { hablar('Bienvenido al juego Imitar Movimientos!'); setTimeout(iniciarMovimiento, 2000); }, 1000);
});
</script>
</body>
</html>
