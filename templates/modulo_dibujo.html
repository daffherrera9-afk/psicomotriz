<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lienzo Mágico ✨</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:#0a0a1a;min-height:100vh;overflow:hidden}

  .header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.7);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px)}
  .back-btn{background:rgba(255,255,255,.2);border:none;border-radius:50px;padding:7px 14px;font-family:'Nunito',sans-serif;font-weight:700;color:white;cursor:pointer;font-size:.85rem;text-decoration:none}
  .header h2{font-family:'Fredoka One',cursive;font-size:1.2rem;color:white;text-shadow:0 0 20px rgba(255,200,0,.8)}
  .header-btns{display:flex;gap:8px}
  .btn-accion{border:none;border-radius:50px;padding:7px 14px;font-family:'Nunito',sans-serif;font-weight:900;color:white;cursor:pointer;font-size:.85rem}
  .btn-limpiar{background:rgba(239,68,68,.8)}
  .btn-guardar{background:rgba(251,191,36,.9);color:#000}

  video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);z-index:0;opacity:0.55}
  #canvas-draw{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
  #canvas-trace{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none}

  /* Figuras flotantes */
  .figura-flotante{
    position:fixed;
    z-index:50;
    pointer-events:none;
    transform-origin:center center;
    filter:drop-shadow(0 0 18px currentColor);
    transition: filter 0.2s;
  }
  .figura-flotante.agarrada{
    filter:drop-shadow(0 0 35px currentColor) brightness(1.4);
  }

  /* Cursor */
  #cursor{position:fixed;border-radius:50%;pointer-events:none;z-index:200;transform:translate(-50%,-50%);display:none;transition:width .1s,height .1s}
  #cursor-pinza{position:fixed;pointer-events:none;z-index:200;transform:translate(-50%,-50%);display:none;font-size:2rem;line-height:1}

  /* Instruccion */
  .instruccion{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:white;padding:12px 28px;border-radius:50px;font-weight:700;font-size:.95rem;z-index:100;white-space:nowrap;border:2px solid rgba(255,255,255,.15)}

  /* Mensaje figura reconocida */
  #mensaje-figura{
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);
    background-size:300% 300%;
    animation:gradientShift 2s ease infinite;
    color:white;
    font-family:'Fredoka One',cursive;
    font-size:2.8rem;
    padding:20px 45px;
    border-radius:30px;
    z-index:500;
    text-align:center;
    pointer-events:none;
    box-shadow:0 0 60px rgba(255,200,0,.6), 0 10px 40px rgba(0,0,0,.5);
    transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s;
    opacity:0;
    text-shadow:2px 3px 0 rgba(0,0,0,.3);
    white-space:nowrap;
  }
  #mensaje-figura.visible{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
  }
  @keyframes gradientShift{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  /* Confeti */
  .confeti{
    position:fixed;
    width:12px;height:12px;
    border-radius:3px;
    pointer-events:none;
    z-index:400;
    animation:caerConfeti 1.5s ease-in forwards;
  }
  @keyframes caerConfeti{
    0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}
    100%{opacity:0;transform:translateY(400px) rotate(720deg) scale(0.3)}
  }

  /* Animacion rebote figura */
  @keyframes aparecer{
    0%{transform:scale(0) rotate(-10deg)}
    60%{transform:scale(1.25) rotate(5deg)}
    80%{transform:scale(0.9) rotate(-3deg)}
    100%{transform:scale(1) rotate(0deg)}
  }
  @keyframes flotar{
    0%,100%{margin-top:0px}
    50%{margin-top:-8px}
  }
  @keyframes brillar{
    0%,100%{filter:drop-shadow(0 0 12px currentColor)}
    50%{filter:drop-shadow(0 0 28px currentColor) brightness(1.2)}
  }

  /* Panel colores */
  .colores-panel{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center;background:rgba(0,0,0,.65);padding:10px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.1)}
  .color-btn{width:38px;height:38px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s}
  .color-btn.activo{border-color:white;transform:scale(1.2)}

  /* Panel modo */
  .modo-panel{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center;background:rgba(0,0,0,.65);padding:10px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.1)}
  .modo-btn{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all .2s}
  .modo-btn.activo{border-color:#ffd93d;background:rgba(255,217,61,.25);box-shadow:0 0 12px rgba(255,217,61,.5)}

  /* Contador figuras */
  #contador{position:fixed;top:65px;right:12px;background:rgba(0,0,0,.7);color:white;padding:6px 14px;border-radius:20px;font-weight:900;font-size:.85rem;z-index:100;border:1px solid rgba(255,255,255,.15)}
</style>
</head>
<body>

<div class="header">
  <a href="/" class="back-btn">← Menú</a>
  <h2>✨ Lienzo Mágico</h2>
  <div class="header-btns">
    <button class="btn-accion btn-limpiar" onclick="limpiarTodo()">🗑️ Limpiar</button>
    <button class="btn-accion btn-guardar" onclick="guardar()">💾 Guardar</button>
  </div>
</div>

<div id="contador">🎨 Figuras: <span id="num-figuras">0</span></div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas-trace"></canvas>
<canvas id="canvas-draw"></canvas>
<div id="cursor"></div>
<div id="cursor-pinza">🤌</div>

<div id="mensaje-figura"></div>
<div id="contenedor-figuras"></div>

<div class="colores-panel">
  <span style="color:white;font-size:.65rem;font-weight:900">🎨</span>
  <button class="color-btn activo" style="background:#ef4444" onclick="setColor('#ef4444',this)"></button>
  <button class="color-btn" style="background:#f97316" onclick="setColor('#f97316',this)"></button>
  <button class="color-btn" style="background:#eab308" onclick="setColor('#eab308',this)"></button>
  <button class="color-btn" style="background:#22c55e" onclick="setColor('#22c55e',this)"></button>
  <button class="color-btn" style="background:#3b82f6" onclick="setColor('#3b82f6',this)"></button>
  <button class="color-btn" style="background:#a855f7" onclick="setColor('#a855f7',this)"></button>
  <button class="color-btn" style="background:#ec4899" onclick="setColor('#ec4899',this)"></button>
  <button class="color-btn" style="background:#ffffff" onclick="setColor('#ffffff',this)"></button>
</div>

<div class="modo-panel">
  <span style="color:white;font-size:.6rem;font-weight:900;text-align:center">MODO</span>
  <button class="modo-btn activo" id="btn-dibujar" onclick="setModo('dibujar',this)" title="Dibujar">✏️</button>
  <button class="modo-btn" id="btn-mover" onclick="setModo('mover',this)" title="Mover figuras">🤌</button>
  <button class="modo-btn" id="btn-borrar-figura" onclick="setModo('borrarFigura',this)" title="Borrar figura">🗑️</button>
</div>

<div class="instruccion" id="instruccion">📷 Activando cámara...</div>

<script>
// ===================== ESTADO =====================
const video       = document.getElementById('video');
const canvasDraw  = document.getElementById('canvas-draw');
const canvasTrace = document.getElementById('canvas-trace');
const ctxD        = canvasDraw.getContext('2d');
const ctxT        = canvasTrace.getContext('2d');
const cursor      = document.getElementById('cursor');
const cursorPinza = document.getElementById('cursor-pinza');
const contenedor  = document.getElementById('contenedor-figuras');

let color = '#ef4444';
let modo  = 'dibujar'; // 'dibujar' | 'mover' | 'borrarFigura'

// Dibujo
let posHistory = [];
const SMOOTH   = 5;
let dedoFrames = 0, noDedoFrames = 0;
const UMBRAL   = 2;
let dibujando  = false;
let lastX = null, lastY = null;
let trazoPuntos = []; // puntos del trazo actual

// Figuras flotantes
let figuras = [];
let figuraAgarrada = null;
let offsetAgarre   = {x:0, y:0};
let pinzaActiva    = false;
let pinzaFrames    = 0;
const UMBRAL_PINZA = 4;

// ===================== RESIZE =====================
function resizeCanvas(){
  canvasDraw.width  = canvasTrace.width  = window.innerWidth;
  canvasDraw.height = canvasTrace.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ===================== UI =====================
function setColor(c, btn){
  color = c;
  document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('activo'));
  btn.classList.add('activo');
}
function setModo(m, btn){
  modo = m;
  document.querySelectorAll('.modo-btn').forEach(b=>b.classList.remove('activo'));
  btn.classList.add('activo');
  trazoPuntos = [];
  dibujando   = false;
  lastX = lastY = null;
  posHistory  = [];
  ctxT.clearRect(0,0,canvasTrace.width,canvasTrace.height);
}
function limpiarTodo(){
  ctxD.clearRect(0,0,canvasDraw.width,canvasDraw.height);
  ctxT.clearRect(0,0,canvasTrace.width,canvasTrace.height);
  contenedor.innerHTML = '';
  figuras = [];
  trazoPuntos = [];
  lastX = lastY = null;
  posHistory = [];
  document.getElementById('num-figuras').textContent = '0';
}
function guardar(){
  // Combinar video frame + figuras SVG + canvas en una imagen
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width  = canvasDraw.width;
  tmpCanvas.height = canvasDraw.height;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.drawImage(canvasDraw,0,0);
  const link = document.createElement('a');
  link.download = 'lienzo-magico.png';
  link.href = tmpCanvas.toDataURL();
  link.click();
}

// ===================== SUAVIZADO =====================
function smoothPos(x, y){
  posHistory.push({x,y});
  if(posHistory.length > SMOOTH) posHistory.shift();
  const avg = posHistory.reduce((a,p)=>({x:a.x+p.x,y:a.y+p.y}),{x:0,y:0});
  return {x:avg.x/posHistory.length, y:avg.y/posHistory.length};
}

// ===================== GESTOS =====================
function soloIndice(lm){
  const iUp = lm[8].y  < lm[6].y  - 0.01;
  const mDn = lm[12].y > lm[10].y - 0.02;
  const rDn = lm[16].y > lm[14].y - 0.02;
  const pDn = lm[20].y > lm[18].y - 0.02;
  return iUp && mDn && rDn && pDn;
}
function esPinza(lm){
  // Índice y pulgar cerca = pinza
  const dx = lm[8].x - lm[4].x;
  const dy = lm[8].y - lm[4].y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  return dist < 0.09;
}

// ===================== RECONOCIMIENTO =====================
const FIGURAS_INFO = {
  circulo:    { emoji:'⭕', nombre:'¡Un Círculo!' },
  cuadrado:   { emoji:'🟦', nombre:'¡Un Cuadrado!' },
  triangulo:  { emoji:'🔺', nombre:'¡Un Triángulo!' },
  rectangulo: { emoji:'▬',  nombre:'¡Un Rectángulo!' },
  estrella:   { emoji:'⭐', nombre:'¡Una Estrella!' },
  corazon:    { emoji:'❤️', nombre:'¡Un Corazón!' },
  diamante:   { emoji:'🔷', nombre:'¡Un Diamante!' },
  luna:       { emoji:'🌙', nombre:'¡Una Luna!' },
  hexagono:   { emoji:'⬡',  nombre:'¡Un Hexágono!' },
  flecha:     { emoji:'➡️', nombre:'¡Una Flecha!' },
};

function reconocerFigura(puntos){
  if(puntos.length < 8) return null;

  // Bounding box
  const xs = puntos.map(p=>p.x), ys = puntos.map(p=>p.y);
  const minX=Math.min(...xs), maxX=Math.max(...xs);
  const minY=Math.min(...ys), maxY=Math.max(...ys);
  const W = maxX-minX, H = maxY-minY;
  const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
  if(W<30 || H<30) return null;

  // Normalizar puntos al centro
  const norm = puntos.map(p=>({x:(p.x-cx)/Math.max(W,H)*2, y:(p.y-cy)/Math.max(W,H)*2}));

  // Ratio ancho/alto
  const ratio = W/H;

  // Compacidad (área / perímetro²) — círculo ≈ 0.0796
  let perimeter = 0;
  for(let i=1;i<puntos.length;i++){
    const dx=puntos[i].x-puntos[i-1].x, dy=puntos[i].y-puntos[i-1].y;
    perimeter += Math.sqrt(dx*dx+dy*dy);
  }
  const area = W*H;
  const compacidad = area / (perimeter*perimeter);

  // Cierre del trazo
  const p0=puntos[0], pN=puntos[puntos.length-1];
  const distCierre = Math.sqrt((p0.x-pN.x)**2+(p0.y-pN.y)**2);
  const cerrado = distCierre < Math.max(W,H)*0.45;

  // Esquinas (cambios bruscos de dirección)
  const esquinas = contarEsquinas(puntos);

  // ---- Heurísticas ----

  // Círculo: muy compacto, ratio ~1, cerrado
  if(cerrado && compacidad > 0.055 && ratio > 0.6 && ratio < 1.7 && esquinas < 4){
    return 'circulo';
  }

  // Triángulo: cerrado, 3 esquinas
  if(cerrado && esquinas >= 2 && esquinas <= 4 && (ratio < 0.55 || ratio > 1.8 || compacidad < 0.04)){
    if(esquinas <= 4) return 'triangulo';
  }

  // Cuadrado: cerrado, ratio ~1, 4 esquinas
  if(cerrado && esquinas >= 3 && esquinas <= 6 && ratio > 0.65 && ratio < 1.55){
    return 'cuadrado';
  }

  // Rectángulo: cerrado, ratio lejano de 1
  if(cerrado && esquinas >= 3 && (ratio < 0.5 || ratio > 2.0)){
    return 'rectangulo';
  }

  // Estrella: muchas esquinas, cerrado
  if(cerrado && esquinas >= 7){
    return 'estrella';
  }

  // Diamante: cerrado, ratio ~1, pocos esquinas, forma de rombo
  if(cerrado && esquinas >= 3 && esquinas <= 5 && ratio > 0.5 && ratio < 2.0 && compacidad < 0.05){
    return 'diamante';
  }

  // Corazón: cerrado, ancho > alto, forma especial
  if(cerrado && ratio > 0.8 && ratio < 2.0 && tieneFormaCorazon(norm)){
    return 'corazon';
  }

  // Luna: cerrado, cóncavo
  if(cerrado && esConcavo(puntos,cx,cy) && ratio > 0.4 && ratio < 2.5){
    return 'luna';
  }

  // Hexágono: cerrado, 5-8 esquinas
  if(cerrado && esquinas >= 5 && esquinas <= 8){
    return 'hexagono';
  }

  // Flecha: no cerrado, dirección clara
  if(!cerrado && ratio > 1.5){
    return 'flecha';
  }

  return null;
}

function contarEsquinas(puntos){
  const step = Math.max(1, Math.floor(puntos.length/20));
  let esquinas = 0;
  for(let i=step; i<puntos.length-step; i+=step){
    const dx1 = puntos[i].x - puntos[i-step].x;
    const dy1 = puntos[i].y - puntos[i-step].y;
    const dx2 = puntos[i+step].x - puntos[i].x;
    const dy2 = puntos[i+step].y - puntos[i].y;
    const len1 = Math.sqrt(dx1*dx1+dy1*dy1)||1;
    const len2 = Math.sqrt(dx2*dx2+dy2*dy2)||1;
    const dot  = (dx1*dx2+dy1*dy2)/(len1*len2);
    const ang  = Math.acos(Math.max(-1,Math.min(1,dot)));
    if(ang > 0.7) esquinas++;
  }
  return esquinas;
}

function tieneFormaCorazon(norm){
  // Punto más alto debe estar partido (dos lóbulos)
  const topPoints = norm.filter(p=>p.y < -0.2);
  if(topPoints.length < 3) return false;
  const xsTop = topPoints.map(p=>p.x);
  const spread = Math.max(...xsTop) - Math.min(...xsTop);
  return spread > 0.5;
}

function esConcavo(puntos, cx, cy){
  let dentroCount = 0;
  puntos.forEach(p=>{
    const dx=p.x-cx, dy=p.y-cy;
    if(Math.sqrt(dx*dx+dy*dy) < Math.max(...puntos.map(q=>Math.sqrt((q.x-cx)**2+(q.y-cy)**2)))*0.5)
      dentroCount++;
  });
  return dentroCount > puntos.length * 0.15;
}

// ===================== CREAR FIGURA SVG =====================
const COLORES_VIVOS = ['#ff4757','#ff6b81','#ffa502','#eccc68','#2ed573','#1e90ff','#a29bfe','#fd79a8','#fdcb6e','#00cec9'];

function crearFiguraSVG(tipo, cx, cy, w, h, col){
  const c = col || COLORES_VIVOS[Math.floor(Math.random()*COLORES_VIVOS.length)];
  const size = Math.max(w,h,80);
  const s2 = size/2;
  let svgInner = '';

  const gradId = 'g'+Date.now();

  const grad = `<defs>
    <radialGradient id="${gradId}" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="${c}" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="glow${gradId}">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>`;

  const fillStroke = `fill="url(#${gradId})" stroke="${c}" stroke-width="4" filter="url(#glow${gradId})"`;

  switch(tipo){
    case 'circulo':
      svgInner = `<circle cx="${s2}" cy="${s2}" r="${s2-6}" ${fillStroke}/>`;
      break;
    case 'cuadrado':
      svgInner = `<rect x="8" y="8" width="${size-16}" height="${size-16}" rx="12" ${fillStroke}/>`;
      break;
    case 'triangulo':
      svgInner = `<polygon points="${s2},8 ${size-8},${size-8} 8,${size-8}" ${fillStroke}/>`;
      break;
    case 'rectangulo':{
      const rw = size*1.5, rh = size*0.75;
      return crearElementoFigura(tipo,cx,cy,rw,rh,c,
        `<svg width="${rw}" height="${rh}" xmlns="http://www.w3.org/2000/svg">${grad}<rect x="8" y="8" width="${rw-16}" height="${rh-16}" rx="12" ${fillStroke}/></svg>`
      );
    }
    case 'estrella':{
      const pts = puntosEstrella(s2,s2,s2-6,s2*0.45,5);
      svgInner = `<polygon points="${pts}" ${fillStroke}/>`;
      break;
    }
    case 'corazon':
      svgInner = `<path d="M${s2},${size*0.8} C${size*0.1},${size*0.55} 0,${size*0.3} ${s2},${size*0.15} C${size},${size*0.3} ${size*0.9},${size*0.55} ${s2},${size*0.8}Z" ${fillStroke}/>`;
      break;
    case 'diamante':
      svgInner = `<polygon points="${s2},8 ${size-8},${s2} ${s2},${size-8} 8,${s2}" ${fillStroke}/>`;
      break;
    case 'luna':
      svgInner = `<path d="M${size*0.7},${size*0.1} A${s2-6},${s2-6} 0 1,0 ${size*0.7},${size*0.9} A${s2*0.6},${s2*0.6} 0 1,1 ${size*0.7},${size*0.1}Z" ${fillStroke}/>`;
      break;
    case 'hexagono':{
      const hpts = puntosPoligono(s2,s2,s2-6,6);
      svgInner = `<polygon points="${hpts}" ${fillStroke}/>`;
      break;
    }
    case 'flecha':
      svgInner = `<polygon points="8,${s2*0.6} ${size*0.6},${s2*0.6} ${size*0.6},8 ${size-8},${s2} ${size*0.6},${size-8} ${size*0.6},${s2*1.4} 8,${s2*1.4}" ${fillStroke}/>`;
      break;
    default:
      svgInner = `<circle cx="${s2}" cy="${s2}" r="${s2-6}" ${fillStroke}/>`;
  }

  const svgStr = `<svg width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${grad}${svgInner}</svg>`;
  return crearElementoFigura(tipo, cx, cy, size, size, c, svgStr);
}

function crearElementoFigura(tipo, cx, cy, w, h, c, svgStr){
  const div = document.createElement('div');
  div.className = 'figura-flotante';
  div.style.color = c;
  div.style.width  = w+'px';
  div.style.height = h+'px';
  div.style.left   = (cx - w/2)+'px';
  div.style.top    = (cy - h/2)+'px';
  div.style.animation = `aparecer 0.6s cubic-bezier(.34,1.56,.64,1) forwards, brillar 2s ease-in-out infinite 0.7s`;
  div.innerHTML = svgStr;
  div.dataset.tipo = tipo;
  div.dataset.color = c;

  const obj = {
    el: div,
    x: cx, y: cy,
    w, h,
    color: c,
    tipo,
    flotando: true,
    phase: Math.random()*Math.PI*2
  };
  figuras.push(obj);
  contenedor.appendChild(div);
  document.getElementById('num-figuras').textContent = figuras.length;
  return obj;
}

function puntosEstrella(cx,cy,R,r,n){
  let pts=[];
  for(let i=0;i<n*2;i++){
    const ang = (i*Math.PI/n) - Math.PI/2;
    const rad = i%2===0 ? R : r;
    pts.push(`${cx+rad*Math.cos(ang)},${cy+rad*Math.sin(ang)}`);
  }
  return pts.join(' ');
}
function puntosPoligono(cx,cy,r,n){
  let pts=[];
  for(let i=0;i<n;i++){
    const ang = (i*2*Math.PI/n) - Math.PI/2;
    pts.push(`${cx+r*Math.cos(ang)},${cy+r*Math.sin(ang)}`);
  }
  return pts.join(' ');
}

// ===================== CONFETI =====================
function lanzarConfeti(cx, cy){
  const cols = ['#ff4757','#ffa502','#2ed573','#1e90ff','#a29bfe','#fd79a8','#ffd32a','#fff'];
  for(let i=0;i<40;i++){
    const el = document.createElement('div');
    el.className = 'confeti';
    el.style.background = cols[Math.floor(Math.random()*cols.length)];
    el.style.left = (cx + (Math.random()-0.5)*200) + 'px';
    el.style.top  = (cy + (Math.random()-0.5)*100) + 'px';
    el.style.animationDelay = (Math.random()*0.4)+'s';
    el.style.animationDuration = (1+Math.random()*0.8)+'s';
    el.style.borderRadius = Math.random()>0.5 ? '50%' : '3px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2500);
  }
}

// ===================== MENSAJE =====================
let msgTimer = null;
function mostrarMensaje(tipo){
  const info = FIGURAS_INFO[tipo];
  if(!info) return;
  const el = document.getElementById('mensaje-figura');
  el.textContent = info.emoji + ' ' + info.nombre + ' ' + info.emoji;
  el.classList.add('visible');
  if(msgTimer) clearTimeout(msgTimer);
  msgTimer = setTimeout(()=>el.classList.remove('visible'), 2200);
}

// ===================== LOOP FLOTACION =====================
let t = 0;
function animarFiguras(){
  t += 0.02;
  figuras.forEach(f=>{
    if(!f.agarrada){
      const dy = Math.sin(t + f.phase)*5;
      f.el.style.top  = (f.y - f.h/2 + dy)+'px';
    }
  });
  requestAnimationFrame(animarFiguras);
}
animarFiguras();

// ===================== MEDIAPIPE =====================
const hands = new Hands({
  locateFile: fn => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${fn}`
});
hands.setOptions({
  maxNumHands:1,
  modelComplexity:1,
  minDetectionConfidence:0.4,
  minTrackingConfidence:0.6
});

hands.onResults(res => {
  if(res.multiHandLandmarks && res.multiHandLandmarks.length > 0){
    const lm = res.multiHandLandmarks[0];
    const raw = lm[8];

    const rawX = (1-raw.x)*canvasDraw.width;
    const rawY = Math.min(raw.y*canvasDraw.height*1.1, canvasDraw.height-10);
    const {x,y} = smoothPos(rawX,rawY);

    const pinzaAhora = esPinza(lm);

    // ---- MODO DIBUJAR ----
    if(modo === 'dibujar'){
      cursor.style.display = 'block';
      cursorPinza.style.display = 'none';
      cursor.style.left = x+'px';
      cursor.style.top  = y+'px';

      if(soloIndice(lm)){
        dedoFrames++; noDedoFrames=0;
        if(dedoFrames>=UMBRAL) dibujando=true;
      } else {
        noDedoFrames++; dedoFrames=0;
        if(noDedoFrames>=UMBRAL){
          if(dibujando && trazoPuntos.length > 6){
            // Intentar reconocer
            const tipo = reconocerFigura(trazoPuntos);
            const bx = trazoPuntos.map(p=>p.x), by = trazoPuntos.map(p=>p.y);
            const cx2 = (Math.min(...bx)+Math.max(...bx))/2;
            const cy2 = (Math.min(...by)+Math.max(...by))/2;
            const w2  = Math.max(...bx)-Math.min(...bx);
            const h2  = Math.max(...by)-Math.min(...by);

            if(tipo){
              // Borrar trazo del canvas
              ctxT.clearRect(0,0,canvasTrace.width,canvasTrace.height);
              ctxD.clearRect(0,0,canvasDraw.width,canvasDraw.height);
              // Crear figura
              crearFiguraSVG(tipo, cx2, cy2, w2, h2, color);
              lanzarConfeti(cx2,cy2);
              mostrarMensaje(tipo);
            } else {
              // No reconocida — dejar el trazo en canvas permanente
              ctxD.drawImage(canvasTrace,0,0);
              ctxT.clearRect(0,0,canvasTrace.width,canvasTrace.height);
            }
          }
          dibujando=false; lastX=null; lastY=null;
          posHistory=[]; trazoPuntos=[];
        }
      }

      const sz = 18;
      cursor.style.width  = sz+'px';
      cursor.style.height = sz+'px';
      cursor.style.background = dibujando ? color : 'transparent';
      cursor.style.border = `3px solid ${dibujando?'white':'rgba(255,255,255,0.4)'}`;

      document.getElementById('instruccion').textContent =
        dibujando ? '✏️ ¡Dibujando! Levanta el dedo al terminar' : '☝️ Levanta solo el índice para dibujar';

      if(dibujando){
        trazoPuntos.push({x,y});
        if(lastX!==null){
          // Dibujar en canvas trace (temporal)
          ctxT.beginPath();
          ctxT.moveTo(lastX,lastY);
          ctxT.lineTo(x,y);
          ctxT.lineWidth = 5;
          ctxT.lineCap  = 'round';
          ctxT.lineJoin = 'round';
          ctxT.strokeStyle = color;
          ctxT.globalAlpha = 0.85;
          ctxT.stroke();
          ctxT.globalAlpha = 1;
        }
        lastX=x; lastY=y;
      }
    }

    // ---- MODO MOVER ----
    else if(modo === 'mover'){
      cursor.style.display = 'none';
      cursorPinza.style.display = 'block';
      cursorPinza.style.left = x+'px';
      cursorPinza.style.top  = y+'px';

      if(pinzaAhora){
        pinzaFrames++; 
        if(pinzaFrames >= UMBRAL_PINZA && !pinzaActiva){
          pinzaActiva = true;
          // Buscar figura bajo la pinza
          figuraAgarrada = null;
          for(let i=figuras.length-1;i>=0;i--){
            const f=figuras[i];
            if(x>=f.x-f.w/2 && x<=f.x+f.w/2 && y>=f.y-f.h/2 && y<=f.y+f.h/2){
              figuraAgarrada=f;
              f.agarrada=true;
              f.el.classList.add('agarrada');
              offsetAgarre={x:x-f.x, y:y-f.y};
              break;
            }
          }
        }
        if(pinzaActiva && figuraAgarrada){
          figuraAgarrada.x = x - offsetAgarre.x;
          figuraAgarrada.y = y - offsetAgarre.y;
          figuraAgarrada.el.style.left = (figuraAgarrada.x - figuraAgarrada.w/2)+'px';
          figuraAgarrada.el.style.top  = (figuraAgarrada.y - figuraAgarrada.h/2)+'px';
        }
      } else {
        pinzaFrames = 0;
        if(figuraAgarrada){
          figuraAgarrada.agarrada=false;
          figuraAgarrada.el.classList.remove('agarrada');
          figuraAgarrada.phase = Math.random()*Math.PI*2;
        }
        figuraAgarrada=null;
        pinzaActiva=false;
      }

      document.getElementById('instruccion').textContent =
        pinzaActiva && figuraAgarrada ? '🤌 ¡Moviendo figura!' : '🤌 Junta índice y pulgar sobre una figura';
    }

    // ---- MODO BORRAR FIGURA ----
    else if(modo === 'borrarFigura'){
      cursor.style.display = 'block';
      cursorPinza.style.display = 'none';
      cursor.style.left = x+'px';
      cursor.style.top  = y+'px';
      cursor.style.width  = '30px';
      cursor.style.height = '30px';
      cursor.style.background = 'rgba(239,68,68,0.5)';
      cursor.style.border = '3px solid #ef4444';

      if(soloIndice(lm)){
        dedoFrames++; noDedoFrames=0;
        if(dedoFrames>=UMBRAL){
          // Buscar figura bajo cursor
          for(let i=figuras.length-1;i>=0;i--){
            const f=figuras[i];
            if(x>=f.x-f.w/2 && x<=f.x+f.w/2 && y>=f.y-f.h/2 && y<=f.y+f.h/2){
              f.el.style.transition='transform .3s, opacity .3s';
              f.el.style.transform='scale(0) rotate(30deg)';
              f.el.style.opacity='0';
              setTimeout(()=>f.el.remove(),300);
              figuras.splice(i,1);
              document.getElementById('num-figuras').textContent=figuras.length;
              break;
            }
          }
        }
      } else {
        dedoFrames=0;
      }

      document.getElementById('instruccion').textContent = '☝️ Apunta a una figura para borrarla';
    }

  } else {
    // Sin mano
    cursor.style.display = 'none';
    cursorPinza.style.display = 'none';
    dedoFrames=0; noDedoFrames=0;
    pinzaFrames=0; pinzaActiva=false;
    if(figuraAgarrada){ figuraAgarrada.agarrada=false; figuraAgarrada.el.classList.remove('agarrada'); figuraAgarrada=null; }
    dibujando=false; lastX=null; lastY=null; posHistory=[]; trazoPuntos=[];
    ctxT.clearRect(0,0,canvasTrace.width,canvasTrace.height);
    document.getElementById('instruccion').textContent = '✋ Muestra tu mano frente a la cámara';
  }
});

const camera = new Camera(video,{
  onFrame: async()=>{ await hands.send({image:video}); },
  width:1280, height:720
});
camera.start().then(()=>{
  document.getElementById('instruccion').textContent = '✋ Muestra tu mano frente a la cámara';
});
</script>
