<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dibujo con Movimiento</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:#000;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden}

  .header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.7);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px)}
  .back-btn{background:rgba(255,255,255,.2);border:none;border-radius:50px;padding:7px 14px;font-family:'Nunito',sans-serif;font-weight:700;color:white;cursor:pointer;font-size:.85rem;text-decoration:none}
  .header h2{font-size:1rem;font-weight:900;color:white}
  .header-btns{display:flex;gap:8px}
  .btn-limpiar{background:rgba(239,68,68,.8);border:none;border-radius:50px;padding:7px 14px;font-family:'Nunito',sans-serif;font-weight:900;color:white;cursor:pointer;font-size:.85rem}
  .btn-guardar{background:rgba(251,191,36,.9);border:none;border-radius:50px;padding:7px 14px;font-family:'Nunito',sans-serif;font-weight:900;color:white;cursor:pointer;font-size:.85rem}

  .canvas-container{position:relative;width:100vw;height:100vh}
  video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
  #canvas-draw{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
  #canvas-mediapipe{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}

  .colores-panel{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center;background:rgba(0,0,0,.6);padding:10px 8px;border-radius:20px;backdrop-filter:blur(10px)}
  .color-btn{width:40px;height:40px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s}
  .color-btn:hover{transform:scale(1.2)}
  .color-btn.activo{border-color:white;transform:scale(1.2)}
  .grosor-panel{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center;background:rgba(0,0,0,.6);padding:10px 8px;border-radius:20px;backdrop-filter:blur(10px)}
  .grosor-btn{width:40px;height:40px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
  .grosor-btn.activo{border-color:white;background:rgba(255,255,255,.3)}
  .grosor-dot{background:white;border-radius:50%}

  .instruccion{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:white;padding:10px 24px;border-radius:50px;font-weight:700;font-size:.9rem;backdrop-filter:blur(10px);z-index:100;text-align:center}
  .dedo-indicador{position:absolute;width:20px;height:20px;border-radius:50%;border:3px solid white;pointer-events:none;transform:translate(-50%,-50%);z-index:200;transition:left .05s,top .05s}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="/" class="back-btn">← Menú</a>
  <h2>🎨 Dibujo con Movimiento</h2>
  <div class="header-btns">
    <button class="btn-limpiar" onclick="limpiar()">🗑️ Limpiar</button>
    <button class="btn-guardar" onclick="guardar()">💾 Guardar</button>
  </div>
</div>

<!-- CANVAS -->
<div class="canvas-container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas-draw"></canvas>
  <canvas id="canvas-mediapipe"></canvas>
  <div class="dedo-indicador" id="dedo" style="display:none"></div>
</div>

<!-- COLORES -->
<div class="colores-panel">
  <p style="color:white;font-size:.6rem;font-weight:900;text-transform:uppercase">Color</p>
  <button class="color-btn activo" style="background:#ef4444" onclick="elegirColor('#ef4444',this)"></button>
  <button class="color-btn" style="background:#f97316" onclick="elegirColor('#f97316',this)"></button>
  <button class="color-btn" style="background:#eab308" onclick="elegirColor('#eab308',this)"></button>
  <button class="color-btn" style="background:#22c55e" onclick="elegirColor('#22c55e',this)"></button>
  <button class="color-btn" style="background:#3b82f6" onclick="elegirColor('#3b82f6',this)"></button>
  <button class="color-btn" style="background:#a855f7" onclick="elegirColor('#a855f7',this)"></button>
  <button class="color-btn" style="background:#ffffff" onclick="elegirColor('#ffffff',this)"></button>
  <button class="color-btn" style="background:#000000;border:2px solid #555" onclick="elegirColor('#000000',this)"></button>
</div>

<!-- GROSOR -->
<div class="grosor-panel">
  <p style="color:white;font-size:.6rem;font-weight:900;text-transform:uppercase">Grosor</p>
  <button class="grosor-btn activo" onclick="elegirGrosor(4,this)"><div class="grosor-dot" style="width:4px;height:4px"></div></button>
  <button class="grosor-btn" onclick="elegirGrosor(10,this)"><div class="grosor-dot" style="width:10px;height:10px"></div></button>
  <button class="grosor-btn" onclick="elegirGrosor(20,this)"><div class="grosor-dot" style="width:18px;height:18px"></div></button>
  <button class="grosor-btn" onclick="elegirGrosor(40,this)" style="font-size:1.2rem">🧹</button>
</div>

<!-- INSTRUCCION -->
<div class="instruccion" id="instruccion">📷 Activando cámara...</div>

<script>
  const video = document.getElementById('video');
  const canvasDraw = document.getElementById('canvas-draw');
  const ctxDraw = canvasDraw.getContext('2d');
  const dedo = document.getElementById('dedo');

  let colorActual = '#ef4444';
  let grosorActual = 4;
  let dibujando = false;
  let ultimoX = null, ultimoY = null;
  let modoborrador = false;

  function resizeCanvas() {
    canvasDraw.width = window.innerWidth;
    canvasDraw.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function elegirColor(color, btn) {
    colorActual = color;
    modoborrador = false;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('activo'));
    btn.classList.add('activo');
  }

  function elegirGrosor(g, btn) {
    if (g === 40) { modoborrador = true; grosorActual = 40; }
    else { modoborrador = false; grosorActual = g; }
    document.querySelectorAll('.grosor-btn').forEach(b => b.classList.remove('activo'));
    btn.classList.add('activo');
  }

  function limpiar() {
    ctxDraw.clearRect(0, 0, canvasDraw.width, canvasDraw.height);
    hablar('Lienzo limpio!');
  }

  function guardar() {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = canvasDraw.width;
    tempCanvas.height = canvasDraw.height;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.drawImage(canvasDraw, 0, 0);
    const link = document.createElement('a');
    link.download = 'mi-dibujo.png';
    link.href = tempCanvas.toDataURL();
    link.click();
    hablar('Tu dibujo fue guardado!');
  }

  function hablar(texto) {
    const u = new SpeechSynthesisUtterance(texto);
    u.lang = 'es-ES';
    u.rate = 0.9;
    speechSynthesis.speak(u);
  }

  // MediaPipe
  const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.7, minTrackingConfidence:0.5});

  hands.onResults(results => {
    if (results.multiHandLandmarks?.length > 0) {
      const landmarks = results.multiHandLandmarks[0];
      const indice = landmarks[8];
      const medio = landmarks[12];

      // Coordenadas en pantalla (espejadas)
      const x = (1 - indice.x) * canvasDraw.width;
      const y = indice.y * canvasDraw.height;

      // Mostrar indicador del dedo
      dedo.style.display = 'block';
      dedo.style.left = `${(1 - indice.x) * 100}%`;
      dedo.style.top = `${indice.y * 100}%`;
      dedo.style.background = colorActual;

      // Detectar si el dedo índice está levantado y el medio no
      const indiceArriba = indice.y < landmarks[6].y;
      const medioAbajo = medio.y > landmarks[10].y;

      if (indiceArriba && medioAbajo) {
        // Dibujar
        ctxDraw.lineWidth = modoborrador ? grosorActual : grosorActual;
        ctxDraw.lineCap = 'round';
        ctxDraw.lineJoin = 'round';
        ctxDraw.strokeStyle = modoborrador ? 'rgba(0,0,0,0)' : colorActual;
        ctxDraw.globalCompositeOperation = modoborrador ? 'destination-out' : 'source-over';

        if (ultimoX !== null) {
          ctxDraw.beginPath();
          ctxDraw.moveTo(ultimoX, ultimoY);
          ctxDraw.lineTo(x, y);
          ctxDraw.stroke();
        }
        ultimoX = x;
        ultimoY = y;
        dibujando = true;
        document.getElementById('instruccion').textContent = '✏️ Dibujando...';
      } else {
        ultimoX = null;
        ultimoY = null;
        dibujando = false;
        document.getElementById('instruccion').textContent = '☝️ Levanta solo el dedo índice para dibujar';
      }
    } else {
      dedo.style.display = 'none';
      ultimoX = null;
      ultimoY = null;
      document.getElementById('instruccion').textContent = '✋ Muestra tu mano frente a la cámara';
    }
  });

  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({image: video}); },
    width: 1280, height: 720
  });

  camera.start().then(() => {
    document.getElementById('instruccion').textContent = '☝️ Levanta solo el dedo índice para dibujar';
    hablar('Bienvenido al juego Dibujo con Movimiento. Levanta tu dedo índice para dibujar!');
  });
</script>
</body>
</html>
