<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lienzo Mágico ✨</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:#0a0a1a;min-height:100vh;overflow:hidden}
  .header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.7);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(10px)}
  .back-btn{background:rgba(255,255,255,.2);border:none;border-radius:50px;padding:7px 14px;font-family:'Nunito',sans-serif;font-weight:700;color:white;cursor:pointer;font-size:.85rem;text-decoration:none}
  .header h2{font-family:'Fredoka One',cursive;font-size:1.2rem;color:white;text-shadow:0 0 20px rgba(255,200,0,.8)}
  .header-btns{display:flex;gap:8px}
  .btn-accion{border:none;border-radius:50px;padding:7px 14px;font-family:'Nunito',sans-serif;font-weight:900;color:white;cursor:pointer;font-size:.85rem}
  .btn-limpiar{background:rgba(239,68,68,.8)}
  .btn-guardar{background:rgba(251,191,36,.9);color:#000}
  video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);z-index:0;opacity:0.55}
  #canvas-draw{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
  #cursor{position:fixed;border-radius:50%;pointer-events:none;z-index:200;transform:translate(-50%,-50%);display:none}
  .instruccion{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:white;padding:12px 28px;border-radius:50px;font-weight:700;font-size:.95rem;z-index:100;white-space:nowrap;border:2px solid rgba(255,255,255,.15)}
  .colores-panel{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:8px;align-items:center;background:rgba(0,0,0,.65);padding:10px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.1)}
  .color-btn{width:38px;height:38px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s}
  .color-btn.activo{border-color:white;transform:scale(1.2)}
  .grosor-panel{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;gap:10px;align-items:center;background:rgba(0,0,0,.65);padding:10px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.1)}
  .grosor-btn{border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .grosor-btn.activo{border-color:#ffd93d;background:rgba(255,217,61,.25)}
</style>
</head>
<body>

<div class="header">
  <a href="/" class="back-btn">← Menú</a>
  <h2>✨ Lienzo Mágico</h2>
  <div class="header-btns">
    <button class="btn-accion btn-limpiar" onclick="limpiarTodo()">🗑️ Limpiar</button>
    <button class="btn-accion btn-guardar" onclick="guardar()">💾 Guardar</button>
  </div>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas-draw"></canvas>
<div id="cursor"></div>

<div class="colores-panel">
  <span style="color:white;font-size:.65rem;font-weight:900">🎨</span>
  <button class="color-btn activo" style="background:#ef4444" onclick="setColor('#ef4444',this)"></button>
  <button class="color-btn" style="background:#f97316" onclick="setColor('#f97316',this)"></button>
  <button class="color-btn" style="background:#eab308" onclick="setColor('#eab308',this)"></button>
  <button class="color-btn" style="background:#22c55e" onclick="setColor('#22c55e',this)"></button>
  <button class="color-btn" style="background:#3b82f6" onclick="setColor('#3b82f6',this)"></button>
  <button class="color-btn" style="background:#a855f7" onclick="setColor('#a855f7',this)"></button>
  <button class="color-btn" style="background:#ec4899" onclick="setColor('#ec4899',this)"></button>
  <button class="color-btn" style="background:#ffffff" onclick="setColor('#ffffff',this)"></button>
</div>

<div class="grosor-panel">
  <span style="color:white;font-size:.6rem;font-weight:900;text-align:center">✏️</span>
  <button class="grosor-btn activo" style="width:36px;height:36px" onclick="setGrosor(5,this)" title="Fino">
    <div style="width:4px;height:4px;border-radius:50%;background:white;margin:auto"></div>
  </button>
  <button class="grosor-btn" style="width:40px;height:40px" onclick="setGrosor(12,this)" title="Medio">
    <div style="width:10px;height:10px;border-radius:50%;background:white;margin:auto"></div>
  </button>
  <button class="grosor-btn" style="width:44px;height:44px" onclick="setGrosor(24,this)" title="Grueso">
    <div style="width:18px;height:18px;border-radius:50%;background:white;margin:auto"></div>
  </button>
  <button class="grosor-btn" style="width:44px;height:44px" onclick="setGrosor(0,this)" title="Borrador">
    <span style="font-size:1.1rem">🧹</span>
  </button>
</div>

<div class="instruccion" id="instruccion">📷 Activando cámara...</div>

<script>
const video      = document.getElementById('video');
const canvasDraw = document.getElementById('canvas-draw');
const ctx        = canvasDraw.getContext('2d');
const cursor     = document.getElementById('cursor');

let color = '#ef4444';
let grosor = 5;
let posHistory = [], dedoFrames = 0, noDedoFrames = 0;
const SMOOTH = 5, UMBRAL = 2;
let dibujando = false, lastX = null, lastY = null;

// ── Trazos guardados para poder moverlos ──
let trazos = [];          // [{pts, color, grosor, dx, dy}]
let trazoActual = [];     // puntos del trazo en curso

// ── Mover con pinza ──
let pinzaFrames = 0, pinzaActiva = false;
const UMBRAL_PINZA = 4;
let trazoAgarrado = null, offsetAgarre = {x:0, y:0};

canvasDraw.width  = window.innerWidth;
canvasDraw.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvasDraw.width  = window.innerWidth;
  canvasDraw.height = window.innerHeight;
  redibujarTodo();
});

function setColor(c, btn){
  color = c;
  if(grosor === 0) grosor = 5;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
}

function setGrosor(g, btn){
  grosor = g;
  document.querySelectorAll('.grosor-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
}

function limpiarTodo(){
  trazos = [];
  trazoActual = [];
  ctx.clearRect(0, 0, canvasDraw.width, canvasDraw.height);
}

function guardar(){
  const a = document.createElement('a');
  a.download = 'lienzo-magico.png';
  a.href = canvasDraw.toDataURL();
  a.click();
}

function smoothPos(x, y){
  posHistory.push({x, y});
  if(posHistory.length > SMOOTH) posHistory.shift();
  const s = posHistory.reduce((a,p) => ({x: a.x+p.x, y: a.y+p.y}), {x:0, y:0});
  return {x: s.x/posHistory.length, y: s.y/posHistory.length};
}

function soloIndice(lm){
  return lm[8].y < lm[6].y - 0.01 &&
         lm[12].y > lm[10].y - 0.02 &&
         lm[16].y > lm[14].y - 0.02 &&
         lm[20].y > lm[18].y - 0.02;
}

function esPinza(lm){
  const dx = lm[8].x - lm[4].x, dy = lm[8].y - lm[4].y;
  return Math.sqrt(dx*dx + dy*dy) < 0.09;
}

// Dibuja un trazo en el canvas dado su offset dx,dy
function dibujarTrazo(t){
  if(t.pts.length < 2) return;
  ctx.globalCompositeOperation = 'source-over';
  ctx.strokeStyle = t.color;
  ctx.lineWidth   = t.grosor;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.moveTo(t.pts[0].x + t.dx, t.pts[0].y + t.dy);
  for(let i = 1; i < t.pts.length; i++)
    ctx.lineTo(t.pts[i].x + t.dx, t.pts[i].y + t.dy);
  ctx.stroke();
}

function redibujarTodo(){
  ctx.clearRect(0, 0, canvasDraw.width, canvasDraw.height);
  trazos.forEach(t => dibujarTrazo(t));
}

// Encontrar el trazo más cercano al punto (x,y)
function encontrarTrazo(x, y){
  const MARGEN = 30;
  for(let i = trazos.length - 1; i >= 0; i--){
    const t = trazos[i];
    for(const p of t.pts){
      const px = p.x + t.dx, py = p.y + t.dy;
      if(Math.hypot(x - px, y - py) < MARGEN + t.grosor) return t;
    }
  }
  return null;
}

const hands = new Hands({locateFile: fn => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${fn}`});
hands.setOptions({maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.4, minTrackingConfidence:0.6});

hands.onResults(res => {
  if(res.multiHandLandmarks && res.multiHandLandmarks.length > 0){
    const lm = res.multiHandLandmarks[0];
    const {x, y} = smoothPos(
      (1 - lm[8].x) * canvasDraw.width,
      Math.min(lm[8].y * canvasDraw.height * 1.1, canvasDraw.height - 10)
    );

    const pinzaAhora = esPinza(lm);
    const indiceAhora = soloIndice(lm);
    const esBorrador  = grosor === 0;

    // ── MODO PINZA: mover trazo ──
    if(pinzaAhora && !indiceAhora){
      // Soltar trazo si estaba dibujando
      if(dibujando && trazoActual.length > 1){
        trazos.push({pts: trazoActual, color, grosor, dx:0, dy:0});
        trazoActual = [];
        redibujarTodo();
      }
      dibujando = false; lastX = lastY = null;

      pinzaFrames++;
      if(pinzaFrames >= UMBRAL_PINZA && !pinzaActiva){
        pinzaActiva = true;
        trazoAgarrado = encontrarTrazo(x, y);
        if(trazoAgarrado) offsetAgarre = {x: x - trazoAgarrado.dx, y: y - trazoAgarrado.dy};
      }
      if(pinzaActiva && trazoAgarrado){
        trazoAgarrado.dx = x - offsetAgarre.x;
        trazoAgarrado.dy = y - offsetAgarre.y;
        redibujarTodo();
      }

      cursor.style.cssText = `display:block;left:${x}px;top:${y}px;width:30px;height:30px;background:transparent;border:3px solid #ffd93d;border-radius:50%;pointer-events:none;z-index:200;transform:translate(-50%,-50%)`;
      document.getElementById('instruccion').textContent = trazoAgarrado ? '🤌 ¡Moviendo!' : '🤌 Junta dedos sobre un dibujo';
      return;
    }

    // Soltar pinza
    if(!pinzaAhora){
      pinzaFrames = 0;
      if(pinzaActiva){ pinzaActiva = false; trazoAgarrado = null; }
    }

    // ── MODO DIBUJAR: solo índice ──
    const esBorradorMode = esBorrador;
    const tamCursor = esBorradorMode ? 44 : Math.max(grosor * 2, 16);
    cursor.style.cssText = `
      display:block;left:${x}px;top:${y}px;
      width:${tamCursor}px;height:${tamCursor}px;
      background:${dibujando && !esBorradorMode ? color : 'transparent'};
      border:3px solid ${dibujando ? 'white' : 'rgba(255,255,255,0.4)'};
      border-radius:50%;pointer-events:none;z-index:200;
      transform:translate(-50%,-50%)
    `;

    if(indiceAhora){
      dedoFrames++; noDedoFrames = 0;
      if(dedoFrames >= UMBRAL) dibujando = true;
    } else {
      noDedoFrames++; dedoFrames = 0;
      if(noDedoFrames >= UMBRAL){
        // Guardar trazo al levantar el dedo
        if(dibujando && trazoActual.length > 1 && !esBorradorMode){
          trazos.push({pts: trazoActual, color, grosor, dx:0, dy:0});
        }
        trazoActual = [];
        dibujando = false;
        lastX = lastY = null;
      }
    }

    document.getElementById('instruccion').textContent =
      dibujando ? (esBorradorMode ? '🧹 Borrando...' : '✏️ Dibujando...') : '☝️ Levanta el índice para dibujar';

    if(dibujando && lastX !== null){
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(x, y);
      if(esBorradorMode){
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = 44;
      } else {
        ctx.globalCompositeOperation = 'source-over';
        ctx.strokeStyle = color;
        ctx.lineWidth = grosor;
        trazoActual.push({x, y});
      }
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.globalAlpha = 1;
      ctx.stroke();
      ctx.globalCompositeOperation = 'source-over';
    }

    if(dibujando){ lastX = x; lastY = y; }

  } else {
    cursor.style.display = 'none';
    dedoFrames = noDedoFrames = pinzaFrames = 0;
    pinzaActiva = false; trazoAgarrado = null;
    if(dibujando && trazoActual.length > 1 && grosor !== 0){
      trazos.push({pts: trazoActual, color, grosor, dx:0, dy:0});
    }
    trazoActual = [];
    dibujando = false; lastX = lastY = null; posHistory = [];
    document.getElementById('instruccion').textContent = '✋ Muestra tu mano frente a la cámara';
  }
});

const camera = new Camera(video, {
  onFrame: async () => { await hands.send({image: video}); },
  width: 1280, height: 720
});
camera.start().then(() => {
  document.getElementById('instruccion').textContent = '✋ Muestra tu mano frente a la cámara';
});
</script>
</body>
</html>
